      const getMonthName = (monthStr) => {
        const months = [
          "Janeiro",
          "Fevereiro",
          "Março",
          "Abril",
          "Maio",
          "Junho",
          "Julho",
          "Agosto",
          "Setembro",
          "Outubro",
          "Novembro",
          "Dezembro",
        ];
        if (!monthStr) return "";
        const [year, month] = monthStr.split("-");
        return `${months[parseInt(month) - 1]}/${year}`;
      };

      const getBase64Image = async (url) => {
        try {
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 10000);
          const res = await fetch(url, { signal: controller.signal, cache: "no-cache" });
          clearTimeout(timeoutId);
          if (!res.ok) {
            console.warn("Imagem não acessível para PDF:", url, res.status);
            return null;
          }
          const blob = await res.blob();
          if (!blob || !blob.type || !blob.type.startsWith("image/")) {
            console.warn("URL não retornou imagem válida:", url, blob && blob.type);
            return null;
          }
          const dataUrl = await new Promise((resolve) => {
            const reader = new FileReader();
            reader.onloadend = () => resolve(reader.result);
            reader.onerror = () => {
              console.warn("FileReader falhou ao ler imagem:", url);
              resolve(null);
            };
            reader.onabort = () => resolve(null);
            try {
              reader.readAsDataURL(blob);
            } catch (e) {
              console.warn("Exceção em readAsDataURL:", e);
              resolve(null);
            }
          });
          if (!dataUrl || typeof dataUrl !== "string" || !dataUrl.startsWith("data:image/")) {
            return null;
          }
          return dataUrl;
        } catch (e) {
          console.warn("Erro ao carregar imagem para o PDF:", url, e);
          return null;
        }
      };

      const detectImageFormat = (dataUrl) => {
        if (typeof dataUrl !== "string") return "JPEG";
        const m = dataUrl.match(/^data:image\/([a-zA-Z0-9+]+)/);
        if (!m) return "JPEG";
        const sub = m[1].toLowerCase();
        if (sub === "jpg" || sub === "jpeg") return "JPEG";
        if (sub === "png") return "PNG";
        if (sub === "webp") return "WEBP";
        return "JPEG";
      };

            0: { cellWidth: 20 },
            5: { halign: "center" },
            6: { halign: "right" },
            7: { halign: "right" },

        const imagesBase64 = {};
        if (comImagem) {
          const uniqueUrls = Array.from(
            new Set(
              itens
                .map((it) => it.produtos?.imagem_url)
                .filter((u) => typeof u === "string" && u.length > 0),
            ),
          );
          const results = await Promise.all(
            uniqueUrls.map(async (u) => [u, await getBase64Image(u)]),
          );
          for (const [u, data] of results) {
            imagesBase64[u] = data;
          }
        }

        const tableData = itens.map((item) => {
          const nomeProduto = item.produtos?.nome || item.nome || "N/A";
          const codInterno = getCodigoInterno(item.produtos || nomeProduto);

          const row = [
            codInterno,
            nomeProduto,
            item.produtos?.marca || item.marca || "N/A",
            item.produtos?.unidade || item.unidade || "N/A",
            item.quantidade,
            formatCurrency(
              item.preco_unitario || item.preco_total / item.quantidade,
            ),
            formatCurrency(item.preco_total),
          ];

          if (comImagem) {
            row.unshift(""); // Empty slot for the picture
          }
          return row;
        });

        doc.autoTable({
          startY: 70,
          head: head,
          body: tableData,
          theme: "striped",
          headStyles: { fillColor: [30, 58, 138], textColor: 255 },
          columnStyles: columnStyles,
          bodyStyles: comImagem ? { minCellHeight: 20, valign: "middle" } : {},
          didDrawCell: function (data) {
            if (comImagem && data.section === "body" && data.column.index === 0) {
              const itemRowIndex = data.row.index;
              const item = itens[itemRowIndex];
              const url = item?.produtos?.imagem_url;
              const imgData = url ? imagesBase64[url] : null;
              if (imgData && typeof imgData === "string" && imgData.startsWith("data:image/")) {
                try {
                  const fmt = detectImageFormat(imgData);
                  doc.addImage(imgData, fmt, data.cell.x + 2, data.cell.y + 2, 16, 16);
                } catch (e) {
                  console.warn("Erro ao desenhar imagem no PDF", e);
                }
              }
            }
          },
        });

        // Total
        const finalY = doc.lastAutoTable.finalY + 10;
        const valorTotal = pedido.valor_total || pedido.valor;
        doc.setFontSize(12);
        doc.setFont("helvetica", "bold");
        doc.text(`VALOR TOTAL: ${formatCurrency(valorTotal)}`, 190, finalY, {
          align: "right",
        });

        if (pedido.orcamento) {

          doc.text(
            `Orçamento Mensal: ${formatCurrency(pedido.orcamento)}`,

        // Observations
        if (pedido.observacoes) {
          doc.setFontSize(10);
          doc.setFont("helvetica", "italic");
          doc.setTextColor(70, 70, 70);
          doc.text("Observações:", 20, finalY + 15);
          const splitObs = doc.splitTextToSize(pedido.observacoes, 170);
          doc.text(splitObs, 20, finalY + 22);
        }

        // Footer
        const pageCount = doc.internal.getNumberOfPages();
        for (let i = 1; i <= pageCount; i++) {
          doc.setPage(i);
          doc.setFontSize(9);
          doc.setTextColor(150, 150, 150);
          doc.text(`Página ${i} de ${pageCount}`, 105, 285, { align: "center" });
          doc.text("Sistema de Requisição de Material - Ello Atacadão", 105, 290, {
            align: "center",
          });
        }

        doc.save(`Pedido_RM_${numero}.pdf`);
      };

      // Aceita um produto (obj) ou um nome (string).
      // Se receber produto e ele tiver codigo_interno gravado no banco,
      // usa esse valor — fonte de verdade para integrações.
      // Caso contrário, tenta o mapa hard-coded por nome (legacy seed) e
      // por último gera um código alfabético determinístico (placeholder).
      const getCodigoInterno = (produtoOrNome) => {
        if (produtoOrNome && typeof produtoOrNome === "object") {
          const ci = produtoOrNome.codigo_interno;
          if (ci !== null && ci !== undefined && String(ci).trim() !== "") {
            return String(ci);
          }
          return getCodigoInterno(produtoOrNome.nome);
        }
        const nome = produtoOrNome;
        if (!nome || nome === "N/A") return "XXXX";
        if (PRODUCT_INTERNAL_CODES[nome]) {
          return PRODUCT_INTERNAL_CODES[nome];
        }
        let hash = 0;
        for (let i = 0; i < nome.length; i++) {
          hash = nome.charCodeAt(i) + ((hash << 5) - hash);
        }
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        let result = '';
        hash = Math.abs(hash) || 1234;
        for (let i = 0; i < 4; i++) {
          result += chars[hash % 26];
          hash = Math.floor(hash / 26);
        }
        return result;
      };

      // Image Upload Component
      function ImageUploadCell({ produto, onUploadComplete }) {
        const [uploading, setUploading] = useState(false);
        const fileInputRef = useRef(null);

        const handleImageClick = () => {
          fileInputRef.current?.click();
        };

        const handleFileChange = async (e) => {
          const file = e.target.files?.[0];
          if (!file) return;

          if (file.size > 2 * 1024 * 1024) {
            alert("A imagem deve ter no máximo 2MB.");
            return;
          }

          setUploading(true);
          try {
            const ext = file.name.split(".").pop();
            const fileName = `${produto.id}_${Date.now()}.${ext}`;

            const { error: uploadError } = await supabase.storage
              .from("produtos-imagens")
              .upload(fileName, file, { cacheControl: "3600", upsert: true });

            if (uploadError) throw uploadError;

            const { data: publicUrlData } = supabase.storage
              .from("produtos-imagens")
              .getPublicUrl(fileName);

            const imageUrl = publicUrlData.publicUrl;

            const { error: updateError } = await supabase
              .from("produtos")
              .update({ imagem_url: imageUrl })
              .eq("id", produto.id);

            if (updateError) throw updateError;

            if (onUploadComplete) onUploadComplete(produto.id, imageUrl);
          } catch (err) {
            console.error("Erro ao subir imagem:", err);
            alert("Erro ao enviar imagem: " + err.message);
          } finally {
            setUploading(false);
          }
        };

        return (
          <div
            className="relative w-10 h-10 flex-shrink-0 group cursor-pointer"
            onClick={handleImageClick}
            title="Clique para alterar a imagem do produto"
          >
            {uploading ? (
              <div className="w-full h-full bg-gray-100 rounded border border-gray-300 flex items-center justify-center">
                <div className="animate-spin rounded-full h-4 w-4 border-b-2 border-blue-600"></div>
              </div>
            ) : produto.imagem_url ? (
              <img
                src={produto.imagem_url}
                alt={produto.nome}
                className="w-full h-full object-cover rounded border border-gray-200 group-hover:opacity-75 transition"
              />
            ) : (
              <div className="w-full h-full bg-gray-50 rounded border border-gray-300 flex items-center justify-center group-hover:bg-blue-50 transition text-gray-400">
                <LucideImage size={20} />
              </div>
            )}
            <input
              ref={fileInputRef}
              type="file"
              accept="image/*"
              onChange={handleFileChange}
              className="hidden"
            />
          </div>
        );
      }

          if (password !== confirmPassword) {

              password,

              onComplete();

            loadData();

          // Use user?.id (not full user object) so this only re-fires when the
          // user IDENTITY changes, not when Supabase refreshes the token and
          // recreates the user object reference (TOKEN_REFRESHED events).
          // eslint-disable-next-line react-hooks/exhaustive-deps
        }, [user?.id]);

        const loadData = async () => {
          setLoading(true);
          setLoadError("");
          try {
            // Fetch products and user profile IN PARALLEL, each with a timeout
            const [prodResult, perfilResult] = await Promise.allSettled([
              withTimeout(
                supabase.from("produtos").select("*").eq("ativo", true),
                10000,
                "produtos",
              ),
              withTimeout(
                supabase
                  .from("perfis")
                  .select("local_id, locais(*)")
                  .eq("email", user.email)
                  .single(),
                10000,
                "perfis",
              ),
            ]);

            // Handle products result
            if (prodResult.status === "fulfilled") {
              const { data, error } = prodResult.value;
              if (error) {
                console.error("Erro ao buscar produtos:", error);
                setLoadError("Erro ao carregar produtos: " + error.message);
                return;
              }
              setProdutos(data || []);
            } else {
              console.error("Timeout/erro em produtos:", prodResult.reason);
              setLoadError(
                "Não foi possível carregar os produtos. Verifique sua conexão e tente novamente.",
              );
              return;
            }

            // Handle perfis result (non-blocking — page loads even without local_id)
            let localId = null;
            if (perfilResult.status === "fulfilled") {
              const { data, error } = perfilResult.value;
              if (!error && data) {
                localId = data.local_id;
                setUserLocalId(localId);
                if (data.locais) {
                  setOrcamento(data.locais.orcamento_mensal || 0);
                  setCliente(data.locais.codigo_contrato || "");
                  setLocalNome(data.locais.nome || "");
                  setCentroCusto(data.locais.centro_custo || "");
                }
              } else {
                console.warn("Perfil sem local_id ou erro:", error);
              }
            } else {
              console.warn("Timeout ao buscar perfil:", perfilResult.reason);
            }

            // Fetch estoque if we have a localId
            if (localId) {
              try {
                const { data: estData, error: estError } = await withTimeout(
                  supabase
                    .from("estoque")
                    .select("produto_id, quantidade")
                    .eq("local_id", localId),
                  8000,
                  "estoque",
                );
                if (!estError && estData) {
                  const estoqueMap = {};
                  estData.forEach((item) => {
                    estoqueMap[item.produto_id] = item.quantidade;
                  });
                  setEstoque(estoqueMap);
                }
              } catch (estErr) {
                console.warn("Não foi possível carregar estoque:", estErr);
                // Non-fatal — continue without estoque data
              }
            }
          } catch (err) {
            console.error("Erro inesperado:", err);
            setLoadError("Erro inesperado: " + err.message);
          } finally {
            setLoading(false);
          }

        // ── All hooks must come BEFORE any early returns (Rules of Hooks) ──
        const totalValue = useMemo(() => {
          return Object.entries(cartItems).reduce((sum, [prodId, qty]) => {
            const produto = produtos.find((p) => p.id === prodId);
            return sum + (produto ? produto.preco_unitario * qty : 0);
          }, 0);
        }, [cartItems, produtos]);

        const saldoRestante = orcamento - totalValue;
        const exceedsBudget = totalValue > orcamento;

        const filteredProdutos = useMemo(() => {

              const nome = String(p.nome || "").toLowerCase();
              const codigo = getCodigoInterno(p).toLowerCase();
              const busca = String(searchTerm || "").toLowerCase();
              const matchSearch = nome.includes(busca) || codigo.includes(busca);
              const matchBrand = !filterBrand || p.marca === filterBrand;
              return matchSearch && matchBrand;
            })
            .sort((a, b) =>
              String(a.nome || "").localeCompare(String(b.nome || ""), "pt-BR", { sensitivity: "base" })
            );
        }, [produtos, searchTerm, filterBrand]);

        const uniqueBrands = useMemo(() => {
          return [
            ...new Set(produtos.map((p) => p.marca).filter(Boolean)),
          ].sort();
        }, [produtos]);

        // ── Early returns (after all hooks) ──
        if (loading) {
          return (
            <div className="flex items-center justify-center h-screen">
              <div className="text-center">
                <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-800 mx-auto mb-4"></div>
                <p className="text-gray-600">Carregando produtos...</p>
              </div>
            </div>
          );

        if (loadError) {
          return (
            <div className="flex items-center justify-center h-screen">
              <div className="text-center max-w-md">
                <div className="text-5xl mb-4">⚠️</div>

                  Erro ao carregar

                >

              </div>
            </div>

            setCartItems((prev) => ({
              ...prev,
              [produtoId]: qty,
            }));
          } else {
            setCartItems((prev) => {
              const updated = { ...prev };
              delete updated[produtoId];
              return updated;
            });

        };

            const { data: pedido, error: pedidoError } = await supabase
              .from("pedidos")
              .insert([

                  usuario_id: authUser.id,
                  mes_referencia: mesReferencia ? `${mesReferencia}-01` : null,

                  orcamento: orcamento,
                  status: "pendente",
                  observacoes: observacoes,
                  centro_custo: centroCusto || cliente,

              .select()

                produto_id: prodId,
                quantidade: qty,
                preco_unitario: produto.preco_unitario,
                preco_total: produto.preco_unitario * qty,
              };
            });

              .from("itens_pedido")
              .insert(itens);

            if (itensError) throw itensError;

            setSubmitting(false);

                {lastPedido &&

                            <LucideImage size={18} />

                          </button>
                        </div>
                      </div>
                    );
                })()}
            </div>
          )}

            <h2 className="text-2xl sm:text-3xl font-bold text-gray-800 mb-6">
              Nova Requisição
            </h2>

            {/* Budget Summary */}
            <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">

              <div className="bg-white rounded-lg p-4 border border-gray-200">

              <div

            {exceedsBudget && (

            {/* Form */}
            <form onSubmit={handleSubmit} className="space-y-6">

                  return (
