      // Produtos Admin Component (Admin Only)
      function ProdutosAdmin() {
        const [produtos, setProdutos] = useState([]);
        const [locais, setLocais] = useState([]);
        const [estoque, setEstoque] = useState([]);
        const [loading, setLoading] = useState(true);
        const [searchTerm, setSearchTerm] = useState("");
        const [filterStatus, setFilterStatus] = useState("ativos"); // "ativos", "inativos", "todos"
        const [filterLocal, setFilterLocal] = useState("");

        const defaultForm = {
          nome: "",
          codigo_interno: "",
          marca: "",
          unidade: "UN",
          preco_unitario: 0,
          ativo: true,
        };
        const [showModal, setShowModal] = useState(false);
        const [editingId, setEditingId] = useState(null);
        const [formData, setFormData] = useState(defaultForm);
        const [saving, setSaving] = useState(false);

        // Estoque state
        const [changes, setChanges] = useState({}); // chave: produtoId___localId
        const [savingEstoque, setSavingEstoque] = useState(false);
        const [uploadingFile, setUploadingFile] = useState(false);
        const [successMsg, setSuccessMsg] = useState("");
        const [errorMsg, setErrorMsg] = useState("");
        const [importPreview, setImportPreview] = useState(null);
        const fileInputRef = useRef();

        useEffect(() => {
          fetchAll();
        }, []);

        const fetchAll = async () => {
          setLoading(true);
          try {
            const [prodRes, locaisRes, estRes] = await Promise.all([
              supabase.from("produtos").select("*").order("nome"),
              supabase.from("locais").select("id, nome").eq("ativo", true),
              supabase.from("estoque").select("*"),
            ]);
            if (prodRes.error) throw prodRes.error;
            if (locaisRes.error) throw locaisRes.error;
            if (estRes.error) throw estRes.error;
            setProdutos(prodRes.data || []);
            setLocais(locaisRes.data || []);
            setEstoque(estRes.data || []);
          } catch (err) {
            console.error("Erro ao buscar dados:", err);
            alert("Erro ao carregar dados: " + err.message);
          } finally {
            setLoading(false);
          }
        };

        const showSuccess = (msg) => {
          setSuccessMsg(msg);
          setTimeout(() => setSuccessMsg(""), 6000);
        };
        const showError = (msg) => {
          setErrorMsg(msg);
          setTimeout(() => setErrorMsg(""), 8000);
        };

        const handleSave = async (e) => {
          e.preventDefault();
          if (!formData.nome) {
            alert("O nome do produto é obrigatório.");
            return;
          }
          const codigoInternoTrim = String(formData.codigo_interno || "").trim();
          let codigoInternoVal = null;
          if (codigoInternoTrim !== "") {
            codigoInternoVal = codigoInternoTrim;

            const duplicado = produtos.find(p =>
              p.codigo_interno !== null &&
              p.codigo_interno !== undefined &&
              String(p.codigo_interno).trim().toLowerCase() === codigoInternoVal.toLowerCase() &&
              p.id !== editingId
            );
            if (duplicado) {
              alert(`O código interno ${codigoInternoVal} já está em uso pelo produto:\n\n"${duplicado.nome}"\n\nCada produto deve ter um código interno único.`);
              return;
            }
          }

          setSaving(true);
          try {
            const payLoad = {
              nome: formData.nome,
              codigo_interno: codigoInternoVal,
              marca: formData.marca || null,
              unidade: formData.unidade || "UN",
              preco_unitario: parseFloat(formData.preco_unitario) || 0,
              ativo: formData.ativo,
            };

            if (editingId) {
              const { error } = await supabase
                .from("produtos")
                .update(payLoad)
                .eq("id", editingId);
              if (error) throw error;
              alert("Produto atualizado com sucesso!");
            } else {
              const { error } = await supabase
                .from("produtos")
                .insert([payLoad]);
              if (error) throw error;
              alert("Produto criado com sucesso!");
            }
            setShowModal(false);
            fetchAll();
          } catch (err) {
            console.error("Erro ao salvar produto", err);
            alert("Erro ao salvar: " + err.message);
          } finally {
            setSaving(false);
          }
        };

        const handleToggleAtivo = async (produto) => {
          const confirmMsg = produto.ativo
              ? `Deseja inativar "${produto.nome}"? Ele não aparecerá mais para novas requisições.`
              : `Deseja reativar "${produto.nome}"?`;
          if (!window.confirm(confirmMsg)) return;

          try {
            const { error } = await supabase
              .from("produtos")
              .update({ ativo: !produto.ativo })
              .eq("id", produto.id);
            if (error) throw error;

            setProdutos(prev => prev.map(p => p.id === produto.id ? { ...p, ativo: !produto.ativo } : p));
          } catch (err) {
            console.error(err);
            alert("Erro ao mudar o status: " + err.message);
          }
        };

        const handleDelete = async (produto) => {
          if (!window.confirm(`ATENÇÃO: Deseja realmente excluir permanentemente "${produto.nome}"? Esta ação removerá o produto do banco de dados.`)) return;

          try {
            const { error } = await supabase
              .from("produtos")
              .delete()
              .eq("id", produto.id);

            if (error) {
              if (error.code === '23503') {
                alert("Não é possível excluir este produto pois ele já está vinculado a estoques ou pedidos anteriores. Por favor, inative-o em vez de excluir.");
              } else {
                throw error;
              }
            } else {
              setProdutos(prev => prev.filter(p => p.id !== produto.id));
              alert("Produto excluído com sucesso.");
            }
          } catch (err) {
            console.error(err);
            alert("Erro ao excluir produto: " + err.message);
          }
        };

        const openNovo = () => {
          setEditingId(null);
          setFormData(defaultForm);
          setShowModal(true);
        };

        const openEditar = (produto) => {
          setEditingId(produto.id);
          setFormData({
            nome: produto.nome || "",
            codigo_interno:
              produto.codigo_interno !== null && produto.codigo_interno !== undefined
                ? String(produto.codigo_interno)
                : "",
            marca: produto.marca || "",
            unidade: produto.unidade || "UN",
            preco_unitario: produto.preco_unitario || 0,
            ativo: produto.ativo !== false,
          });
          setShowModal(true);
        };

        // ── Estoque helpers ───────────────────────────────────────────────
        const getEstoqueItem = (produtoId, localId) =>
          estoque.find(e => e.produto_id === produtoId && e.local_id === localId);

        const changeKey = (produtoId, localId) => `${produtoId}___${localId}`;

        const getCurrentQty = (produtoId, localId) => {
          const key = changeKey(produtoId, localId);
          if (changes[key] !== undefined) return changes[key].novaQuantidade;
          const item = getEstoqueItem(produtoId, localId);
          return item?.quantidade ?? 0;
        };

        const handleQtyChange = (produto, local, newQtyRaw) => {
          const novaQuantidade = Math.max(0, parseInt(newQtyRaw) || 0);
          const key = changeKey(produto.id, local.id);
          const estoqueItem = getEstoqueItem(produto.id, local.id);
          const quantidadeAnterior = estoqueItem?.quantidade ?? 0;
          setChanges(prev => ({
            ...prev,
            [key]: {
              produtoId: produto.id,
              localId: local.id,
              estoqueId: estoqueItem?.id || null,
              novaQuantidade,
              quantidadeAnterior,
              produto,
              local,
            },
          }));
        };

        const handleStep = (produto, local, delta) => {
          const current = getCurrentQty(produto.id, local.id);
          handleQtyChange(produto, local, current + delta);
        };

        const handleSaveEstoque = async () => {
          if (Object.keys(changes).length === 0) return;
          setSavingEstoque(true);
          try {
            const { data: { user: authUser } } = await supabase.auth.getUser();
            const changeList = Object.values(changes);
            const toUpdate = changeList.filter(c => c.estoqueId);
            const toInsert = changeList.filter(c => !c.estoqueId);

            for (const c of toUpdate) {
              const { error } = await supabase
                .from("estoque")
                .update({ quantidade: c.novaQuantidade })
                .eq("id", c.estoqueId);
              if (error) throw error;
              await supabase.from("estoque_movimentacoes").insert([{
                estoque_id: c.estoqueId,
                tipo: "ajuste",
                quantidade: c.novaQuantidade - c.quantidadeAnterior,
                quantidade_anterior: c.quantidadeAnterior,
                quantidade_nova: c.novaQuantidade,
                observacao: "Ajuste manual de estoque",
                usuario_id: authUser.id,
              }]);
            }

            for (const c of toInsert) {
              const { data: inserted, error } = await supabase
                .from("estoque")
                .insert([{
                  produto_id: c.produtoId,
                  local_id: c.localId,
                  quantidade: c.novaQuantidade,
                  quantidade_minima: 0,
                }])
                .select()
                .single();
              if (error) throw error;
              if (inserted) {
                await supabase.from("estoque_movimentacoes").insert([{
                  estoque_id: inserted.id,
                  tipo: "ajuste",
                  quantidade: c.novaQuantidade,
                  quantidade_anterior: 0,
                  quantidade_nova: c.novaQuantidade,
                  observacao: "Registro inicial de estoque",
                  usuario_id: authUser.id,
                }]);
              }
            }

            setChanges({});
            await fetchAll();
            showSuccess(`${changeList.length} item(ns) salvo(s) com sucesso!`);
          } catch (err) {
            console.error("Save estoque error:", err);
            showError("Erro ao salvar estoque: " + err.message);
          } finally {
            setSavingEstoque(false);
          }
        };

        // ── Excel import (estoque) ────────────────────────────────────────
        const handleFileUpload = async (event) => {
          const file = event.target.files?.[0];
          if (!file) return;
          if (fileInputRef.current) fileInputRef.current.value = "";

          setUploadingFile(true);
          try {
            await new Promise((resolve, reject) => {
              const reader = new FileReader();
              reader.onerror = reject;
              reader.onload = async (e) => {
                try {
                  const data = new Uint8Array(e.target.result);
                  const workbook = XLSX.read(data, { type: "array" });
                  const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                  const jsonData = XLSX.utils.sheet_to_json(worksheet, { defval: "" });

                  if (!jsonData.length) {
                    showError("A planilha está vazia.");
                    resolve();
                    return;
                  }

                  const findCol = (row, candidates) => {
                    const keys = Object.keys(row);
                    for (const cand of candidates) {
                      const found = keys.find(k => k.toString().toLowerCase().trim() === cand.toLowerCase());
                      if (found !== undefined) return row[found];
                    }
                    return undefined;
                  };

                  const updates = [];
                  const skipped = [];

                  for (const row of jsonData) {
                    const codigo = String(findCol(row, ["código", "codigo", "code", "cod"]) || "").trim();
                    const qtyRaw = findCol(row, ["quantidade", "estoque", "qty", "saldo", "quantity"]);
                    const localRaw = String(findCol(row, ["local", "local_id", "localid", "nome_local", "location"]) || "").trim();

                    if (!codigo) {
                      skipped.push({ row, motivo: "Código vazio" });
                      continue;
                    }

                    const quantidade = parseInt(qtyRaw) || 0;
                    const produto = produtos.find(p =>
                      getCodigoInterno(p).toLowerCase() === codigo.toLowerCase()
                    );
                    if (!produto) {
                      skipped.push({ row, codigo, motivo: `Código "${codigo}" não encontrado` });
                      continue;
                    }

                    let targetLocais = locais;
                    if (localRaw) {
                      const matched = locais.filter(l =>
                        l.nome.toLowerCase().includes(localRaw.toLowerCase()) || l.id === localRaw
                      );
                      if (matched.length) {
                        targetLocais = matched;
                      } else {
                        skipped.push({ row, codigo, motivo: `Local "${localRaw}" não encontrado` });
                        continue;
                      }
                    }

                    for (const local of targetLocais) {
                      const estoqueItem = getEstoqueItem(produto.id, local.id);
                      updates.push({
                        produtoId: produto.id,
                        localId: local.id,
                        localNome: local.nome,
                        estoqueId: estoqueItem?.id || null,
                        novaQuantidade: quantidade,
                        quantidadeAnterior: estoqueItem?.quantidade ?? 0,
                        produto,
                      });
                    }
                  }

                  if (!updates.length) {
                    showError("Nenhum produto foi identificado na planilha. Verifique os cabeçalhos (Código, Quantidade).");
                    resolve();
                    return;
                  }

                  setImportPreview({ updates, skipped });
                  resolve();
                } catch (err) {
                  console.error("Excel parse error:", err);
                  showError("Erro ao ler o arquivo: " + err.message);
                  reject(err);
                }
              };
              reader.readAsArrayBuffer(file);
            });
          } catch (_) {
            // handled inside
          } finally {
            setUploadingFile(false);
          }
        };

        const handleConfirmImport = async () => {
          if (!importPreview) return;
          const { updates } = importPreview;
          setSavingEstoque(true);
          try {
            const { data: { user: authUser } } = await supabase.auth.getUser();

            for (const upd of updates) {
              if (upd.estoqueId) {
                const { error } = await supabase
                  .from("estoque")
                  .update({ quantidade: upd.novaQuantidade })
                  .eq("id", upd.estoqueId);
                if (error) throw error;
                await supabase.from("estoque_movimentacoes").insert([{
                  estoque_id: upd.estoqueId,
                  tipo: "importacao",
                  quantidade: upd.novaQuantidade - upd.quantidadeAnterior,
                  quantidade_anterior: upd.quantidadeAnterior,
                  quantidade_nova: upd.novaQuantidade,
                  observacao: "Importação de planilha Excel",
                  usuario_id: authUser.id,
                }]);
              } else {
                const { data: inserted, error } = await supabase
                  .from("estoque")
                  .insert([{
                    produto_id: upd.produtoId,
                    local_id: upd.localId,
                    quantidade: upd.novaQuantidade,
                    quantidade_minima: 0,
                  }])
                  .select()
                  .single();
                if (error) throw error;
                if (inserted) {
                  await supabase.from("estoque_movimentacoes").insert([{
                    estoque_id: inserted.id,
                    tipo: "importacao",
                    quantidade: upd.novaQuantidade,
                    quantidade_anterior: 0,
                    quantidade_nova: upd.novaQuantidade,
                    observacao: "Importação inicial via planilha Excel",
                    usuario_id: authUser.id,
                  }]);
                }
              }
            }

            setImportPreview(null);
            await fetchAll();
            showSuccess(`Importação concluída: ${updates.length} item(ns) atualizado(s)!`);
          } catch (err) {
            console.error("Import error:", err);
            showError("Erro durante importação: " + err.message);
          } finally {
            setSavingEstoque(false);
          }
        };

        const handleExportEstoque = () => {
          const rows = [];
          for (const produto of produtos) {
            for (const local of locais) {
              const item = getEstoqueItem(produto.id, local.id);
              rows.push({
                "Código": getCodigoInterno(produto),
                "Descrição": produto.nome,
                "Marca": produto.marca,
                "Unidade": produto.unidade,
                "Local": local.nome,
                "Quantidade": item?.quantidade ?? 0,
                "Quantidade Mínima": item?.quantidade_minima ?? 0,
                "Última Atualização": item ? formatDate(item.updated_at) : "",
              });
            }
          }
          const ws = XLSX.utils.json_to_sheet(rows);
          const wb = XLSX.utils.book_new();
          XLSX.utils.book_append_sheet(wb, ws, "Estoque");
          XLSX.writeFile(wb, `estoque-${new Date().toISOString().split("T")[0]}.xlsx`);
        };

        const filtered = produtos.filter((p) => {
          const pAtivo = p.ativo !== false;
          if (filterStatus === "ativos" && !pAtivo) return false;
          if (filterStatus === "inativos" && pAtivo) return false;

          if (!searchTerm) return true;

          const searchLower = searchTerm.toLowerCase();
          const nomeLower = String(p.nome || "").toLowerCase();
          const codigoInterno = String(getCodigoInterno(p)).toLowerCase();
          const marcaLower = String(p.marca || "").toLowerCase();

          return (
            nomeLower.includes(searchLower) ||
            codigoInterno.includes(searchLower) ||
            marcaLower.includes(searchLower)
          );
        });

        const visibleLocais = useMemo(() => {
          if (filterLocal) return locais.filter(l => l.id === filterLocal);
          return locais;
        }, [locais, filterLocal]);

        const pendingCount = Object.keys(changes).length;

        if (loading) {
          return (
            <div className="flex items-center justify-center h-screen">
              <div className="text-center">
                <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-800 mx-auto mb-4"></div>
                <p className="text-gray-600">Carregando produtos...</p>
              </div>
            </div>
          );
        }

        return (
          <div className="p-4 sm:p-6 max-w-7xl mx-auto pb-32">
            {/* Toasts */}
            {successMsg && (
              <div className="fixed top-4 right-4 bg-green-50 border border-green-200 rounded-lg p-4 flex items-start gap-3 max-w-sm shadow-lg z-50">
                <span className="text-green-600 text-xl mt-0.5">✓</span>
                <p className="font-medium text-green-800 text-sm">{successMsg}</p>
              </div>
            )}
            {errorMsg && (
              <div className="fixed top-4 right-4 bg-red-50 border border-red-200 rounded-lg p-4 flex items-start gap-3 max-w-sm shadow-lg z-50">
                <span className="text-red-600 text-xl mt-0.5">✗</span>
                <p className="font-medium text-red-800 text-sm">{errorMsg}</p>
              </div>
            )}

            {/* Import Preview Modal */}
            {importPreview && (
              <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-2 sm:p-4">
                <div className="bg-white rounded-xl shadow-2xl max-w-2xl w-full max-h-[90vh] sm:max-h-[80vh] flex flex-col">
                  <div className="p-4 sm:p-6 border-b border-gray-200">
                    <h3 className="text-lg sm:text-xl font-bold text-gray-800">Confirmar Importação</h3>
                    <p className="text-xs sm:text-sm text-gray-600 mt-1">
                      {importPreview.updates.length} item(ns) serão atualizados
                      {importPreview.skipped.length > 0 && ` • ${importPreview.skipped.length} linha(s) ignorada(s)`}
                    </p>
                  </div>
                  <div className="overflow-y-auto flex-1 p-4 sm:p-6 overflow-x-auto">
                    <table className="w-full text-sm min-w-[500px]">
                      <thead className="bg-gray-50">
                        <tr>
                          <th className="px-3 py-2 text-left font-semibold text-gray-700">Produto</th>
                          <th className="px-3 py-2 text-left font-semibold text-gray-700">Local</th>
                          <th className="px-3 py-2 text-center font-semibold text-gray-700">Atual</th>
                          <th className="px-3 py-2 text-center font-semibold text-gray-700">Novo</th>
                          <th className="px-3 py-2 text-center font-semibold text-gray-700">Δ</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-gray-100">
                        {importPreview.updates.map((upd, i) => {
                          const delta = upd.novaQuantidade - upd.quantidadeAnterior;
                          return (
                            <tr key={i} className="hover:bg-gray-50">
                              <td className="px-3 py-2">
                                <p className="font-medium text-gray-900">{upd.produto.nome}</p>
                                <p className="text-xs text-gray-500">{getCodigoInterno(upd.produto)}</p>
                              </td>
                              <td className="px-3 py-2 text-gray-600 text-xs">{upd.localNome}</td>
                              <td className="px-3 py-2 text-center text-gray-600">{upd.quantidadeAnterior}</td>
                              <td className="px-3 py-2 text-center font-bold text-gray-900">{upd.novaQuantidade}</td>
                              <td className="px-3 py-2 text-center">
                                <span className={`font-semibold ${delta > 0 ? "text-green-600" : delta < 0 ? "text-red-600" : "text-gray-400"}`}>
                                  {delta > 0 ? "+" : ""}{delta}
                                </span>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                    {importPreview.skipped.length > 0 && (
                      <div className="mt-4">
                        <p className="text-sm font-semibold text-amber-700 mb-2">⚠️ Linhas ignoradas:</p>
                        {importPreview.skipped.map((s, i) => (
                          <p key={i} className="text-xs text-amber-600 bg-amber-50 px-3 py-1 rounded mb-1">
                            {s.codigo ? `Código: ${s.codigo} — ` : ""}{s.motivo}
                          </p>
                        ))}
                      </div>
                    )}
                  </div>
                  <div className="p-6 border-t border-gray-200 flex gap-3 justify-end">
                    <button
                      onClick={() => setImportPreview(null)}
                      className="px-5 py-2 rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-50 transition"
                    >
                      Cancelar
                    </button>
                    <button
                      onClick={handleConfirmImport}
                      disabled={savingEstoque}
                      className="px-5 py-2 rounded-lg bg-blue-800 text-white font-semibold hover:bg-blue-900 disabled:bg-gray-400 transition flex items-center gap-2"
                    >
                      {savingEstoque ? (
                        <>
                          <div className="animate-spin rounded-full h-4 w-4 border-b-2 border-white"></div>
                          Importando...
                        </>
                      ) : (
                        <>✓ Confirmar Importação</>
                      )}
                    </button>
                  </div>
                </div>
              </div>
            )}

            <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
              <h2 className="text-2xl sm:text-3xl font-bold text-gray-800">
                Gestão de Produtos e Estoque
              </h2>
              <div className="flex flex-wrap gap-2">
                <button
                  onClick={() => fileInputRef.current?.click()}
                  disabled={uploadingFile}
                  className="bg-green-600 text-white px-3 sm:px-4 py-2 rounded-lg hover:bg-green-700 disabled:bg-gray-400 transition flex items-center gap-2 text-sm"
                  title="Importar planilha de estoque"
                >
                  <LucideUpload size={18} />
                  <span>{uploadingFile ? "Lendo..." : "Importar Estoque"}</span>
                </button>
                <button
                  onClick={handleExportEstoque}
                  className="bg-blue-600 text-white px-3 sm:px-4 py-2 rounded-lg hover:bg-blue-700 transition flex items-center gap-2 text-sm"
                  title="Exportar estoque para Excel"
                >
                  <LucideDownload size={18} />
                  <span>Exportar Estoque</span>
                </button>
                <button
                  onClick={openNovo}
                  className="bg-blue-800 text-white px-4 py-2 rounded-lg font-medium flex items-center gap-2 hover:bg-blue-900 transition text-sm"
                >
                  <LucidePlus size={18} />
                  Novo Produto
                </button>
              </div>
            </div>

            <input
              ref={fileInputRef}
              type="file"
              accept=".xlsx,.xls"
              onChange={handleFileUpload}
              className="hidden"
            />

            {/* Tip about Excel format */}
            <div className="mb-4 bg-blue-50 border border-blue-200 rounded-lg px-4 py-3 text-xs text-blue-700">
              <strong>📋 Formato da planilha de importação de estoque:</strong> A planilha
              deve ter colunas <strong>Código</strong> (código interno do produto) e{" "}
              <strong>Quantidade</strong> (saldo). Opcionalmente, a coluna{" "}
              <strong>Local</strong> define para qual local importar; sem ela,
              aplica a todos os locais.
            </div>

            <div className="flex flex-col md:flex-row gap-4 mb-6">
              <div className="relative flex-1">
                <LucideSearch className="absolute left-3 top-3 text-gray-400" size={18} />
                <input
                  type="text"
                  placeholder="Pesquisar por descrição, código ou marca..."
                  value={searchTerm}
                  onChange={e => setSearchTerm(e.target.value)}
                  className="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                />
              </div>
              <div className="w-full md:w-48">
                <select
                  value={filterStatus}
                  onChange={e => setFilterStatus(e.target.value)}
                  className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white"
                >
                  <option value="ativos">Apenas Ativos</option>
                  <option value="inativos">Apenas Inativos</option>
                  <option value="todos">Todos os Produtos</option>
                </select>
              </div>
              {locais.length > 1 && (
                <div className="w-full md:w-56">
                  <select
                    value={filterLocal}
                    onChange={e => setFilterLocal(e.target.value)}
                    className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white"
                  >
                    <option value="">Todos os locais</option>
                    {locais.map(l => (
                      <option key={l.id} value={l.id}>{l.nome}</option>
                    ))}
                  </select>
                </div>
              )}
            </div>

            <div className="bg-white rounded-lg border border-gray-200 overflow-hidden shadow-sm hidden md:block">
              <div className="overflow-x-auto">
                <table className="w-full text-sm text-left">
                  <thead className="bg-gray-50 text-gray-700 font-semibold border-b">
                    <tr>
                      <th className="px-4 py-3 text-center">Foto</th>
                      <th className="px-4 py-3">Código Interno</th>
                      <th className="px-4 py-3">Descrição / Nome</th>
                      <th className="px-4 py-3">Marca</th>
                      <th className="px-4 py-3 text-center">Un.</th>
                      <th className="px-4 py-3 text-right">Preço Unit.</th>
                      <th className="px-4 py-3 text-right">Preço ClicVendas</th>
                      <th className="px-4 py-3 text-center">Status</th>
                      {visibleLocais.map(local => (
                        <th key={local.id} className="px-4 py-3 text-center min-w-36 bg-blue-50/50">
                          Estoque · {local.nome}
                        </th>
                      ))}
                      <th className="px-4 py-3 text-center min-w-[210px]">Ações</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-gray-100">
                    {filtered.length === 0 ? (
                      <tr>
                        <td colSpan={9 + visibleLocais.length} className="px-4 py-8 text-center text-gray-500">
                          Nenhum produto encontrado.
                        </td>
                      </tr>
                    ) : (
                      filtered.map(p => (
                        <tr key={p.id} className="hover:bg-gray-50 transition">
                          <td className="px-4 py-3 text-center align-middle">
                            <ImageUploadCell
                              produto={p}
                              onUploadComplete={(id, url) =>
                                setProdutos((prev) =>
                                  prev.map((item) =>
                                    item.id === id ? { ...item, imagem_url: url } : item
                                  )
                                )
                              }
                            />
                          </td>
                          <td className="px-4 py-3 font-mono text-gray-800 align-middle whitespace-nowrap">{getCodigoInterno(p)}</td>
                          <td className="px-4 py-3 font-medium text-gray-900 align-middle">{p.nome}</td>
                          <td className="px-4 py-3 text-gray-600 align-middle">{p.marca || '-'}</td>
                          <td className="px-4 py-3 text-center align-middle text-gray-600">{p.unidade}</td>
                          <td className={`px-4 py-3 text-right align-middle font-medium whitespace-nowrap ${
                            Number(p.preco_clic) > 0 && Number(p.preco_unitario) > 0 && Number(p.preco_unitario) < Number(p.preco_clic)
                              ? "text-orange-700 bg-orange-50"
                              : "text-gray-800"
                          }`}
                          title={
                            Number(p.preco_clic) > 0 && Number(p.preco_unitario) > 0 && Number(p.preco_unitario) < Number(p.preco_clic)
                              ? `Preço do sistema abaixo do ClicVendas em R$ ${(Number(p.preco_clic) - Number(p.preco_unitario)).toFixed(2)}`
                              : ""
                          }>
                            {Number(p.preco_clic) > 0 && Number(p.preco_unitario) > 0 && Number(p.preco_unitario) < Number(p.preco_clic) && (
                              <span className="mr-1">⚠️</span>
                            )}
                            {formatCurrency(p.preco_unitario)}
                          </td>
                          <td className="px-4 py-3 text-right align-middle text-gray-600 whitespace-nowrap">
                            {Number(p.preco_clic) > 0 ? formatCurrency(p.preco_clic) : '-'}
                          </td>
                          <td className="px-4 py-3 text-center align-middle">
                            <span className={`inline-flex px-2 py-1 text-xs font-semibold rounded-full ${p.ativo !== false ? "bg-green-100 text-green-800" : "bg-red-100 text-red-800"}`}>
                              {p.ativo !== false ? 'Ativo' : 'Inativo'}
                            </span>
                          </td>
                          {visibleLocais.map(local => {
                            const estoqueItem = getEstoqueItem(p.id, local.id);
                            const key = changeKey(p.id, local.id);
                            const qty = getCurrentQty(p.id, local.id);
                            const minQty = estoqueItem?.quantidade_minima ?? 0;
                            const isDirty = changes[key] !== undefined;

                            let badgeColor = "bg-green-100 text-green-800";
                            if (qty === 0) badgeColor = "bg-red-100 text-red-800";
                            else if (qty < minQty) badgeColor = "bg-amber-100 text-amber-800";

                            return (
                              <td key={local.id} className="px-4 py-3 align-middle bg-blue-50/30">
                                <div className="flex items-center justify-center gap-1">
                                  <button
                                    onClick={() => handleStep(p, local, -1)}
                                    className="w-7 h-7 rounded-md border border-gray-300 bg-white hover:bg-gray-100 text-gray-600 font-bold text-lg leading-none flex items-center justify-center transition"
                                    title="Diminuir 1"
                                  >
                                    −
                                  </button>
                                  <input
                                    type="number"
                                    min="0"
                                    value={qty}
                                    onChange={(e) => handleQtyChange(p, local, e.target.value)}
                                    className={`w-16 px-1 py-1 border-2 rounded text-center font-semibold text-sm outline-none focus:ring-2 focus:ring-blue-500 transition ${isDirty ? "border-blue-400 bg-blue-50" : `border-transparent ${badgeColor}`}`}
                                  />
                                  <button
                                    onClick={() => handleStep(p, local, 1)}
                                    className="w-7 h-7 rounded-md border border-gray-300 bg-white hover:bg-gray-100 text-gray-600 font-bold text-lg leading-none flex items-center justify-center transition"
                                    title="Aumentar 1"
                                  >
                                    +
                                  </button>
                                </div>
                                {!estoqueItem && !isDirty && (
                                  <p className="text-center text-xs text-gray-400 mt-0.5">sem registro</p>
                                )}
                              </td>
                            );
                          })}
                          <td className="px-4 py-3 text-center align-middle whitespace-nowrap space-x-2">
                            <button
                              title="Editar Produto"
                              onClick={() => openEditar(p)}
                              className="px-2 py-1 text-sm bg-blue-50 text-blue-700 border border-blue-200 rounded hover:bg-blue-100 transition inline-block mb-1 sm:mb-0"
                            >
                              Editar
                            </button>
                            <button
                              title={p.ativo !== false ? 'Inativar' : 'Reativar'}
                              onClick={() => handleToggleAtivo(p)}
                              className={`px-2 py-1 text-sm border rounded transition inline-block mb-1 sm:mb-0 ${
                                p.ativo !== false
                                  ? 'bg-amber-50 text-amber-700 border-amber-200 hover:bg-amber-100'
                                  : 'bg-green-50 text-green-700 border-green-200 hover:bg-green-100'
                              }`}
                            >
                              {p.ativo !== false ? 'Inativar' : 'Reativar'}
                            </button>
                            <button
                              title="Excluir Permanentemente"
                              onClick={() => handleDelete(p)}
                              className="px-2 py-1 text-sm bg-red-50 text-red-700 border border-red-200 rounded hover:bg-red-100 transition inline-block mb-1 sm:mb-0"
                            >
                              Excluir
                            </button>
                          </td>
                        </tr>
                      ))
                    )}
                  </tbody>
                </table>
              </div>
            </div>

            {/* Cards - Mobile */}
            <div className="md:hidden space-y-3">
              {filtered.length === 0 ? (
                <div className="bg-white rounded-lg border border-gray-200 text-center py-10">
                  <p className="text-gray-500 text-sm">Nenhum produto encontrado.</p>
                </div>
              ) : (
                filtered.map((p) => (
                  <div
                    key={p.id}
                    className="bg-white rounded-lg border border-gray-200 p-3 shadow-sm"
                  >
                    <div className="flex gap-3">
                      <div className="flex-shrink-0">
                        <ImageUploadCell
                          produto={p}
                          onUploadComplete={(id, url) =>
                            setProdutos((prev) =>
                              prev.map((item) =>
                                item.id === id ? { ...item, imagem_url: url } : item
                              )
                            )
                          }
                        />
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className="flex items-start justify-between gap-2">
                          <p className="font-medium text-gray-900 text-sm leading-tight break-words flex-1 min-w-0">
                            {p.nome}
                          </p>
                          <span
                            className={`flex-shrink-0 inline-flex px-2 py-0.5 text-[10px] font-semibold rounded-full ${p.ativo !== false ? "bg-green-100 text-green-800" : "bg-red-100 text-red-800"}`}
                          >
                            {p.ativo !== false ? "Ativo" : "Inativo"}
                          </span>
                        </div>
                        <p className="text-xs text-gray-500 font-mono mt-0.5 break-words">
                          {getCodigoInterno(p)}
                        </p>
                        <p className="text-xs text-gray-500 mt-0.5">
                          {p.marca || "-"} • {p.unidade}
                        </p>
                        <div className="mt-1">
                          <p
                            className={`text-sm font-semibold ${
                              Number(p.preco_clic) > 0 &&
                              Number(p.preco_unitario) > 0 &&
                              Number(p.preco_unitario) < Number(p.preco_clic)
                                ? "text-orange-700"
                                : "text-gray-800"
                            }`}
                          >
                            {Number(p.preco_clic) > 0 &&
                              Number(p.preco_unitario) > 0 &&
                              Number(p.preco_unitario) < Number(p.preco_clic) && (
                                <span className="mr-1">⚠️</span>
                              )}
                            {formatCurrency(p.preco_unitario)}
                          </p>
                          {Number(p.preco_clic) > 0 && (
                            <p className="text-[11px] text-gray-500">
                              ClicVendas: {formatCurrency(p.preco_clic)}
                            </p>
                          )}
                        </div>
                      </div>
                    </div>

                    {/* Estoque por local - mobile */}
                    {visibleLocais.length > 0 && (
                      <div className="mt-3 pt-3 border-t border-gray-100 space-y-2">
                        <p className="text-[11px] font-semibold text-gray-600 uppercase tracking-wide">Estoque</p>
                        {visibleLocais.map(local => {
                          const estoqueItem = getEstoqueItem(p.id, local.id);
                          const key = changeKey(p.id, local.id);
                          const qty = getCurrentQty(p.id, local.id);
                          const minQty = estoqueItem?.quantidade_minima ?? 0;
                          const isDirty = changes[key] !== undefined;

                          let badgeColor = "bg-green-100 text-green-800";
                          if (qty === 0) badgeColor = "bg-red-100 text-red-800";
                          else if (qty < minQty) badgeColor = "bg-amber-100 text-amber-800";

                          return (
                            <div key={local.id} className="flex items-center justify-between gap-2">
                              <span className="text-xs text-gray-700 font-medium truncate flex-1">{local.nome}</span>
                              <div className="flex items-center gap-1 flex-shrink-0">
                                <button
                                  onClick={() => handleStep(p, local, -1)}
                                  className="w-8 h-8 rounded-md border border-gray-300 bg-white text-gray-600 font-bold text-lg leading-none flex items-center justify-center active:bg-gray-100"
                                  aria-label="Diminuir"
                                >
                                  −
                                </button>
                                <input
                                  type="number"
                                  min="0"
                                  value={qty}
                                  onChange={(e) => handleQtyChange(p, local, e.target.value)}
                                  className={`w-16 h-8 px-1 border-2 rounded text-center font-semibold text-sm outline-none focus:ring-2 focus:ring-blue-500 transition ${isDirty ? "border-blue-400 bg-blue-50" : `border-transparent ${badgeColor}`}`}
                                />
                                <button
                                  onClick={() => handleStep(p, local, 1)}
                                  className="w-8 h-8 rounded-md border border-gray-300 bg-white text-gray-600 font-bold text-lg leading-none flex items-center justify-center active:bg-gray-100"
                                  aria-label="Aumentar"
                                >
                                  +
                                </button>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    )}

                    <div className="flex flex-wrap gap-2 mt-3 pt-3 border-t border-gray-100">
                      <button
                        onClick={() => openEditar(p)}
                        className="flex-1 px-2 py-1.5 text-xs bg-blue-50 text-blue-700 border border-blue-200 rounded hover:bg-blue-100 transition"
                      >
                        Editar
                      </button>
                      <button
                        onClick={() => handleToggleAtivo(p)}
                        className={`flex-1 px-2 py-1.5 text-xs border rounded transition ${
                          p.ativo !== false
                            ? "bg-amber-50 text-amber-700 border-amber-200 hover:bg-amber-100"
                            : "bg-green-50 text-green-700 border-green-200 hover:bg-green-100"
                        }`}
                      >
                        {p.ativo !== false ? "Inativar" : "Reativar"}
                      </button>
                      <button
                        onClick={() => handleDelete(p)}
                        className="flex-1 px-2 py-1.5 text-xs bg-red-50 text-red-700 border border-red-200 rounded hover:bg-red-100 transition"
                      >
                        Excluir
                      </button>
                    </div>
                  </div>
                ))
              )}
            </div>

            {/* Sticky save bar (estoque) */}
            {pendingCount > 0 && (
              <div className="fixed bottom-3 left-3 right-3 sm:left-1/2 sm:right-auto sm:-translate-x-1/2 bg-white border border-gray-200 shadow-2xl rounded-xl px-3 sm:px-6 py-3 sm:py-4 flex flex-wrap items-center justify-between sm:justify-start gap-2 sm:gap-4 z-40">
                <div className="text-xs sm:text-sm text-gray-700 w-full sm:w-auto">
                  <span className="font-bold text-blue-800">{pendingCount}</span> alteração(ões) de estoque pendente(s)
                </div>
                <button
                  onClick={() => { setChanges({}); fetchAll(); }}
                  className="flex-1 sm:flex-none px-3 sm:px-4 py-2 rounded-lg border border-gray-300 text-gray-600 hover:bg-gray-50 transition text-sm"
                >
                  Descartar
                </button>
                <button
                  onClick={handleSaveEstoque}
                  disabled={savingEstoque}
                  className="flex-1 sm:flex-none px-3 sm:px-5 py-2 rounded-lg bg-blue-800 text-white font-semibold hover:bg-blue-900 disabled:bg-gray-400 transition flex items-center justify-center gap-2 text-sm"
                >
                  {savingEstoque ? (
                    <>
                      <div className="animate-spin rounded-full h-4 w-4 border-b-2 border-white"></div>
                      Salvando...
                    </>
                  ) : (
                    <>
                      <LucideSave size={16} />
                      Salvar
                    </>
                  )}
                </button>
              </div>
            )}

            {/* Modal */}
            {showModal && (
              <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-2 sm:p-4 z-50">
                <div className="bg-white rounded-xl shadow-xl max-w-2xl w-full p-4 sm:p-6 max-h-[95vh] sm:max-h-[90vh] overflow-y-auto">
                  <h3 className="text-lg sm:text-xl font-bold text-gray-900 mb-4 sm:mb-6">
                    {editingId ? "Editar Produto" : "Criar Novo Produto"}
                  </h3>

                  <form onSubmit={handleSave} className="space-y-4">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      <div className="md:col-span-2">
                        <label className="block text-sm font-medium text-gray-700 mb-1">Nome / Descrição *</label>
                        <input
                          type="text"
                          required
                          value={formData.nome}
                          onChange={e => setFormData({ ...formData, nome: e.target.value })}
                          className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                        />
                      </div>

                      <div className="md:col-span-2">
                        <label className="block text-sm font-medium text-gray-700 mb-1">
                          Código Interno
                          <span className="text-gray-400 font-normal ml-1">(usado nas integrações com ClicVendas e importações)</span>
                        </label>
                        <input
                          type="text"
                          value={formData.codigo_interno}
                          onChange={e => setFormData({ ...formData, codigo_interno: e.target.value })}
                          placeholder="Ex: 19153 ou 50E5106"
                          className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none font-mono"
                        />
                      </div>

                      <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">Marca</label>
                        <input
                          type="text"
                          value={formData.marca}
                          onChange={e => setFormData({ ...formData, marca: e.target.value })}
                          className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                        />
                      </div>

                      <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">Unidade (Ex: UN, CX, FD) *</label>
                        <input
                          type="text"
                          required
                          value={formData.unidade}
                          onChange={e => setFormData({ ...formData, unidade: e.target.value })}
                          className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                        />
                      </div>

                      <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">Preço Unitário (R$)</label>
                        <input
                          type="number"
                          step="0.01"
                          min="0"
                          value={formData.preco_unitario}
                          onChange={e => setFormData({ ...formData, preco_unitario: e.target.value })}
                          className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                        />
                      </div>
                      
                      {editingId && (
                        <div className="flex flex-col items-start justify-center pt-6">
                           <label className="flex items-center gap-2 cursor-pointer bg-gray-50 px-4 py-2 rounded-lg border">
                             <input 
                               type="checkbox" 
                               checked={formData.ativo}
                               onChange={(e) => setFormData({ ...formData, ativo: e.target.checked })}
                               className="w-4 h-4 text-blue-600 rounded"
                             />
                             <span className="text-sm font-medium text-gray-800">{formData.ativo ? '✔️ Produto Ativo' : '❌ Produto Inativo'}</span>
                           </label>
                        </div>
                      )}
                    </div>

                    <div className="flex gap-3 justify-end mt-8 border-t pt-4">
                      <button
                        type="button"
                        onClick={() => setShowModal(false)}
                        className="px-5 py-2 rounded-lg border border-gray-300 font-medium text-gray-700 hover:bg-gray-50 transition"
                      >
                        Cancelar
                      </button>
                      <button
                        type="submit"
                        disabled={saving}
                        className="px-5 py-2 rounded-lg bg-blue-800 text-white font-semibold hover:bg-blue-900 transition disabled:bg-gray-400 flex items-center gap-2"
                      >
                        {saving ? (
                          <>
                            <div className="animate-spin rounded-full h-4 w-4 border-b-2 border-white"></div>
                            Salvando...
                          </>
                        ) : 'Salvar Alterações'}
                      </button>
                    </div>
                  </form>
                </div>
              </div>
            )}
          </div>
        );
      }

      // Main App Component
      function App() {
        const [user, setUser] = useState(null);
        const [userRole, setUserRole] = useState(null);
        const [loading, setLoading] = useState(true);
        const [currentPage, setCurrentPage] = useState("nova-requisicao");
        const [sidebarOpen, setSidebarOpen] = useState(false);
        const [isPasswordRecovery, setIsPasswordRecovery] = useState(false);

        useEffect(() => {
          checkAuth();
          const { data: authListener } = supabase.auth.onAuthStateChange(
            (event, session) => {
              if (event === "PASSWORD_RECOVERY") {
                setIsPasswordRecovery(true);
                setLoading(false);
                return;
              }
              if (session?.user) {
                setUser(session.user);
                fetchUserRole(session.user.email);
              } else {
                setUser(null);
                setUserRole(null);
              }
            },
          );

          return () => {
            authListener?.subscription?.unsubscribe();
          };
        }, []);

        const checkAuth = async () => {
          try {
            const {
              data: { user: authUser },
            } = await supabase.auth.getUser();
            if (authUser) {
              setUser(authUser);
              fetchUserRole(authUser.email);
            }
          } catch (err) {
            console.error("Error checking auth:", err);
          } finally {
            setLoading(false);
          }
        };

        const fetchUserRole = async (email) => {
          try {
            const { data } = await supabase
              .from("perfis")
              .select("role")
              .eq("email", email)
              .single();

            if (data) setUserRole(data.role);
          } catch (err) {
            console.error("Error fetching user role:", err);
          }
        };

        const handleLogout = async () => {
          try {
            await supabase.auth.signOut();
            setUser(null);
            setUserRole(null);
            setCurrentPage("nova-requisicao");
          } catch (err) {
            console.error("Error logging out:", err);
          }
        };

        if (loading) {
          return (
            <div className="flex items-center justify-center h-screen bg-gradient-to-br from-blue-50 to-blue-100">
              <div className="text-center">
                <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-800 mx-auto mb-4"></div>
                <p className="text-gray-600">Carregando sistema...</p>
              </div>
            </div>
          );
        }

        if (isPasswordRecovery) {
          return (
            <ResetPasswordPage
              onComplete={() => {
                setIsPasswordRecovery(false);
                setUser(null);
                setUserRole(null);
              }}
            />
          );
        }

        if (!user) {
          return <LoginPage onLogin={setUser} />;
        }

        return (
          <div className="flex h-screen bg-gray-100">
            {/* Mobile overlay */}
            {sidebarOpen && (
              <div
                className="fixed inset-0 bg-black bg-opacity-50 z-30 md:hidden"
                onClick={() => setSidebarOpen(false)}
              />
            )}

            <Sidebar
              user={user}
              userRole={userRole}
              onLogout={handleLogout}
              currentPage={currentPage}
              onPageChange={setCurrentPage}
              isOpen={sidebarOpen}
              onClose={() => setSidebarOpen(false)}
            />

            <main className="flex-1 overflow-y-auto min-w-0">
              {/* Mobile top bar */}
              <div className="md:hidden sticky top-0 z-20 bg-blue-800 text-white px-4 py-3 flex items-center gap-3 shadow-md">
                <button
                  onClick={() => setSidebarOpen(true)}
                  className="p-1 rounded hover:bg-blue-700 transition"
                  aria-label="Abrir menu"
                >
                  <LucideMenu size={24} />
                </button>
                <span className="font-bold text-lg">Ello Atacadão</span>
              </div>

              {currentPage === "nova-requisicao" && (
                <NovaRequisicao user={user} userRole={userRole} />
              )}
              {currentPage === "meus-pedidos" && (
                <MeusPedidos user={user} userRole={userRole} />
              )}
              {currentPage === "produtos" && userRole === "admin" && <ProdutosAdmin />}
              {currentPage === "configuracoes" && userRole === "admin" && (
                <Configuracoes />
              )}
            </main>
          </div>
        );
      }

      // Render app
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
