      // Estoque Component (Admin Only)
      function Estoque() {
        const [produtos, setProdutos] = useState([]);
        const [locais, setLocais] = useState([]);
        const [estoque, setEstoque] = useState([]);
        const [loading, setLoading] = useState(true);
        const [loadError, setLoadError] = useState("");
        const [changes, setChanges] = useState({}); // key = produto_id
        const [saving, setSaving] = useState(false);
        const [uploadingFile, setUploadingFile] = useState(false);
        const [successMsg, setSuccessMsg] = useState("");
        const [errorMsg, setErrorMsg] = useState("");
        const [searchEstoque, setSearchEstoque] = useState("");
        const [filterLocal, setFilterLocal] = useState("");
        const [importPreview, setImportPreview] = useState(null); // {updates, skipped}
        const fileInputRef = useRef();

        useEffect(() => {
          fetchData();
        }, []);

        const fetchData = async () => {
          try {
            setLoading(true);
            setLoadError("");

            const [prodRes, locaisRes, estRes] = await Promise.all([
              supabase
                .from("produtos")
                .select("*")
                .eq("ativo", true)
                .order("nome"),
              supabase.from("locais").select("id, nome").eq("ativo", true),
              supabase.from("estoque").select("*"),
            ]);

            if (prodRes.error) throw prodRes.error;
            if (locaisRes.error) throw locaisRes.error;
            if (estRes.error) throw estRes.error;

            setProdutos(prodRes.data || []);
            setLocais(locaisRes.data || []);
            setEstoque(estRes.data || []);
          } catch (err) {
            console.error("fetchData error:", err);
            setLoadError("Erro ao carregar dados: " + err.message);
          } finally {
            setLoading(false);
          }
        };

        const showSuccess = (msg) => {
          setSuccessMsg(msg);
          setTimeout(() => setSuccessMsg(""), 6000);
        };
        const showError = (msg) => {
          setErrorMsg(msg);
          setTimeout(() => setErrorMsg(""), 8000);
        };

        // Returns estoque row for a (produto, local) pair
        const getEstoqueItem = (produtoId, localId) =>
          estoque.find(
            (e) =>
              e.produto_id === produtoId &&
              (localId ? e.local_id === localId : true),
          );

        // ------------------------------------------------------------------
        // FILTERING
        // ------------------------------------------------------------------
        const filteredProdutos = useMemo(() => {
          let list = produtos;
          if (searchEstoque.trim()) {
            const term = searchEstoque.toLowerCase();
            list = list.filter(
              (p) =>
                String(p.nome || "")
                  .toLowerCase()
                  .includes(term) ||
                String(p.codigo_fornecedor || "")
                  .toLowerCase()
                  .includes(term) ||
                String(p.marca || "")
                  .toLowerCase()
                  .includes(term),
            );
          }
          return list;
        }, [produtos, searchEstoque]);

        // Locais to display columns: use filter or all
        const visibleLocais = useMemo(() => {
          if (filterLocal) return locais.filter((l) => l.id === filterLocal);
          return locais;
        }, [locais, filterLocal]);

        // ------------------------------------------------------------------
        // MANUAL EDITING
        // key for changes map: `{produtoId}___{localId}`
        // ------------------------------------------------------------------
        const changeKey = (produtoId, localId) => `${produtoId}___${localId}`;

        const getCurrentQty = (produtoId, localId) => {
          const key = changeKey(produtoId, localId);
          if (changes[key] !== undefined) return changes[key].novaQuantidade;
          const item = getEstoqueItem(produtoId, localId);
          return item?.quantidade ?? 0;
        };

        const handleQtyChange = (produto, local, newQtyRaw) => {
          const novaQuantidade = Math.max(0, parseInt(newQtyRaw) || 0);
          const key = changeKey(produto.id, local.id);
          const estoqueItem = getEstoqueItem(produto.id, local.id);
          const quantidadeAnterior = estoqueItem?.quantidade ?? 0;

          setChanges((prev) => ({
            ...prev,
            [key]: {
              produtoId: produto.id,
              localId: local.id,
              estoqueId: estoqueItem?.id || null, // null means we need to INSERT
              novaQuantidade,
              quantidadeAnterior,
              produto,
              local,
            },
          }));
        };

        const handleStep = (produto, local, delta) => {
          const current = getCurrentQty(produto.id, local.id);
          handleQtyChange(produto, local, current + delta);
        };

        // ------------------------------------------------------------------
        // SAVE ALL CHANGES (upsert)
        // ------------------------------------------------------------------
        const handleSaveChanges = async () => {
          if (Object.keys(changes).length === 0) return;

          setSaving(true);
          try {
            const {
              data: { user: authUser },
            } = await supabase.auth.getUser();
            const changeList = Object.values(changes);

            // Separate inserts (no existing row) from updates
            const toUpdate = changeList.filter((c) => c.estoqueId);
            const toInsert = changeList.filter((c) => !c.estoqueId);

            // 1. UPDATEs
            for (const c of toUpdate) {
              const { error } = await supabase
                .from("estoque")
                .update({ quantidade: c.novaQuantidade })
                .eq("id", c.estoqueId);
              if (error) throw error;

              await supabase.from("estoque_movimentacoes").insert([
                {
                  estoque_id: c.estoqueId,
                  tipo: "ajuste",
                  quantidade: c.novaQuantidade - c.quantidadeAnterior,
                  quantidade_anterior: c.quantidadeAnterior,
                  quantidade_nova: c.novaQuantidade,
                  observacao: "Ajuste manual de estoque",
                  usuario_id: authUser.id,
                },
              ]);
            }

            // 2. INSERTs (product-local pair had no row yet)
            for (const c of toInsert) {
              const { data: inserted, error } = await supabase
                .from("estoque")
                .insert([
                  {
                    produto_id: c.produtoId,
                    local_id: c.localId,
                    quantidade: c.novaQuantidade,
                    quantidade_minima: 0,
                  },
                ])
                .select()
                .single();
              if (error) throw error;

              if (inserted) {
                await supabase.from("estoque_movimentacoes").insert([
                  {
                    estoque_id: inserted.id,
                    tipo: "ajuste",
                    quantidade: c.novaQuantidade,
                    quantidade_anterior: 0,
                    quantidade_nova: c.novaQuantidade,
                    observacao: "Registro inicial de estoque",
                    usuario_id: authUser.id,
                  },
                ]);
              }
            }

            setChanges({});
            await fetchData();
            showSuccess(`${changeList.length} item(ns) salvo(s) com sucesso!`);
          } catch (err) {
            console.error("Save error:", err);
            showError("Erro ao salvar: " + err.message);
          } finally {
            setSaving(false);
          }
        };

        // ------------------------------------------------------------------
        // EXCEL IMPORT — parse + preview
        // Supported column names (case-insensitive):
        //   código / codigo / codigo_fornecedor / Código
        //   quantidade / estoque / qty / saldo
        //   local / local_id / localid / nome_local
        // ------------------------------------------------------------------
        const handleFileUpload = async (event) => {
          const file = event.target.files?.[0];
          if (!file) return;
          if (fileInputRef.current) fileInputRef.current.value = "";

          setUploadingFile(true);
          try {
            await new Promise((resolve, reject) => {
              const reader = new FileReader();
              reader.onerror = reject;
              reader.onload = async (e) => {
                try {
                  const data = new Uint8Array(e.target.result);
                  const workbook = XLSX.read(data, { type: "array" });
                  const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                  const jsonData = XLSX.utils.sheet_to_json(worksheet, {
                    defval: "",
                  });

                  if (!jsonData.length) {
                    showError("A planilha está vazia.");
                    resolve();
                    return;
                  }

                  // Helper: find column name case-insensitively
                  const findCol = (row, candidates) => {
                    const keys = Object.keys(row);
                    for (const cand of candidates) {
                      const found = keys.find(
                        (k) =>
                          k.toString().toLowerCase().trim() ===
                          cand.toLowerCase(),
                      );
                      if (found !== undefined) return row[found];
                    }
                    return undefined;
                  };

                  const updates = [];
                  const skipped = [];

                  for (const row of jsonData) {
                    const codigo = String(
                      findCol(row, [
                        "código",
                        "codigo",
                        "codigo_fornecedor",
                        "code",
                        "cod",
                      ]) || "",
                    ).trim();
                    const qtyRaw = findCol(row, [
                      "quantidade",
                      "estoque",
                      "qty",
                      "saldo",
                      "quantity",
                    ]);
                    const localRaw = String(
                      findCol(row, [
                        "local",
                        "local_id",
                        "localid",
                        "nome_local",
                        "location",
                      ]) || "",
                    ).trim();

                    if (!codigo) {
                      skipped.push({ row, motivo: "Código vazio" });
                      continue;
                    }

                    const quantidade = parseInt(qtyRaw) || 0;

                    const produto = produtos.find(
                      (p) =>
                        (p.codigo_fornecedor || "").toLowerCase() ===
                        codigo.toLowerCase(),
                    );
                    if (!produto) {
                      skipped.push({
                        row,
                        codigo,
                        motivo: `Código "${codigo}" não encontrado`,
                      });
                      continue;
                    }

                    // Determine target local(is)
                    let targetLocais = locais;
                    if (localRaw) {
                      const matched = locais.filter(
                        (l) =>
                          l.nome
                            .toLowerCase()
                            .includes(localRaw.toLowerCase()) ||
                          l.id === localRaw,
                      );
                      if (matched.length) {
                        targetLocais = matched;
                      } else {
                        skipped.push({
                          row,
                          codigo,
                          motivo: `Local "${localRaw}" não encontrado`,
                        });
                        continue;
                      }
                    }

                    for (const local of targetLocais) {
                      const estoqueItem = getEstoqueItem(produto.id, local.id);
                      updates.push({
                        produtoId: produto.id,
                        localId: local.id,
                        localNome: local.nome,
                        estoqueId: estoqueItem?.id || null,
                        novaQuantidade: quantidade,
                        quantidadeAnterior: estoqueItem?.quantidade ?? 0,
                        produto,
                      });
                    }
                  }

                  if (!updates.length) {
                    showError(
                      "Nenhum produto foi identificado na planilha. Verifique os cabeçalhos (Código, Quantidade).",
                    );
                    resolve();
                    return;
                  }

                  setImportPreview({ updates, skipped });
                  resolve();
                } catch (err) {
                  console.error("Excel parse error:", err);
                  showError("Erro ao ler o arquivo: " + err.message);
                  reject(err);
                }
              };
              reader.readAsArrayBuffer(file);
            });
          } catch (_) {
            // handled inside
          } finally {
            setUploadingFile(false);
          }
        };

        // Actually apply the confirmed import
        const handleConfirmImport = async () => {
          if (!importPreview) return;
          const { updates } = importPreview;

          setSaving(true);
          try {
            const {
              data: { user: authUser },
            } = await supabase.auth.getUser();

            for (const upd of updates) {
              if (upd.estoqueId) {
                // Update existing row
                const { error } = await supabase
                  .from("estoque")
                  .update({ quantidade: upd.novaQuantidade })
                  .eq("id", upd.estoqueId);
                if (error) throw error;

                await supabase.from("estoque_movimentacoes").insert([
                  {
                    estoque_id: upd.estoqueId,
                    tipo: "importacao",
                    quantidade: upd.novaQuantidade - upd.quantidadeAnterior,
                    quantidade_anterior: upd.quantidadeAnterior,
                    quantidade_nova: upd.novaQuantidade,
                    observacao: "Importação de planilha Excel",
                    usuario_id: authUser.id,
                  },
                ]);
              } else {
                // Insert new row
                const { data: inserted, error } = await supabase
                  .from("estoque")
                  .insert([
                    {
                      produto_id: upd.produtoId,
                      local_id: upd.localId,
                      quantidade: upd.novaQuantidade,
                      quantidade_minima: 0,
                    },
                  ])
                  .select()
                  .single();
                if (error) throw error;

                if (inserted) {
                  await supabase.from("estoque_movimentacoes").insert([
                    {
                      estoque_id: inserted.id,
                      tipo: "importacao",
                      quantidade: upd.novaQuantidade,
                      quantidade_anterior: 0,
                      quantidade_nova: upd.novaQuantidade,
                      observacao: "Importação inicial via planilha Excel",
                      usuario_id: authUser.id,
                    },
                  ]);
                }
              }
            }

            setImportPreview(null);
            await fetchData();
            showSuccess(
              `Importação concluída: ${updates.length} item(ns) atualizado(s)!`,
            );
          } catch (err) {
            console.error("Import error:", err);
            showError("Erro durante importação: " + err.message);
          } finally {
            setSaving(false);
          }
        };

        // ------------------------------------------------------------------
        // EXPORT
        // ------------------------------------------------------------------
        const handleExport = () => {
          const rows = [];
          for (const produto of produtos) {
            for (const local of locais) {
              const item = getEstoqueItem(produto.id, local.id);
              rows.push({
                "Código Interno": PRODUCT_INTERNAL_CODES[produto.nome] || produto.id,
                Código: produto.codigo_fornecedor,
                Descrição: produto.nome,
                Marca: produto.marca,
                Unidade: produto.unidade,
                Local: local.nome,
                Quantidade: item?.quantidade ?? 0,
                "Quantidade Mínima": item?.quantidade_minima ?? 0,
                "Última Atualização": item ? formatDate(item.updated_at) : "",
              });
            }
          }
          const ws = XLSX.utils.json_to_sheet(rows);
          const wb = XLSX.utils.book_new();
          XLSX.utils.book_append_sheet(wb, ws, "Estoque");
          XLSX.writeFile(
            wb,
            `estoque-${new Date().toISOString().split("T")[0]}.xlsx`,
          );
        };

        // ------------------------------------------------------------------
        // RENDER HELPERS
        // ------------------------------------------------------------------
        const pendingCount = Object.keys(changes).length;

        if (loading) {
          return (
            <div className="flex items-center justify-center h-screen">
              <div className="text-center">
                <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-800 mx-auto mb-4"></div>
                <p className="text-gray-600">Carregando estoque...</p>
              </div>
            </div>
          );
        }

        if (loadError) {
          return (
            <div className="flex items-center justify-center h-screen">
              <div className="text-center max-w-md">
                <div className="text-5xl mb-4">⚠️</div>
                <h3 className="text-xl font-bold text-gray-800 mb-2">
                  Erro ao carregar
                </h3>
                <p className="text-gray-600 mb-6 text-sm">{loadError}</p>
                <button
                  onClick={fetchData}
                  className="bg-blue-800 text-white px-6 py-3 rounded-lg font-medium hover:bg-blue-900 transition"
                >
                  🔄 Tentar novamente
                </button>
              </div>
            </div>
          );
        }

        return (
          <div className="p-6 max-w-7xl mx-auto">
            {/* Toasts */}
            {successMsg && (
              <div className="fixed top-4 right-4 bg-green-50 border border-green-200 rounded-lg p-4 flex items-start gap-3 max-w-sm shadow-lg z-50">
                <span className="text-green-600 text-xl mt-0.5">✓</span>
                <p className="font-medium text-green-800 text-sm">
                  {successMsg}
                </p>
              </div>
            )}
            {errorMsg && (
              <div className="fixed top-4 right-4 bg-red-50 border border-red-200 rounded-lg p-4 flex items-start gap-3 max-w-sm shadow-lg z-50">
                <span className="text-red-600 text-xl mt-0.5">✗</span>
                <p className="font-medium text-red-800 text-sm">{errorMsg}</p>
              </div>
            )}

            {/* Import Preview Modal */}
            {importPreview && (
              <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                <div className="bg-white rounded-xl shadow-2xl max-w-2xl w-full max-h-[80vh] flex flex-col">
                  <div className="p-6 border-b border-gray-200">
                    <h3 className="text-xl font-bold text-gray-800">
                      Confirmar Importação
                    </h3>
                    <p className="text-sm text-gray-600 mt-1">
                      {importPreview.updates.length} item(ns) serão atualizados
                      {importPreview.skipped.length > 0 &&
                        ` • ${importPreview.skipped.length} linha(s) ignorada(s)`}
                    </p>
                  </div>
                  <div className="overflow-y-auto flex-1 p-6">
                    <table className="w-full text-sm">
                      <thead className="bg-gray-50">
                        <tr>
                          <th className="px-3 py-2 text-left font-semibold text-gray-700">
                            Produto
                          </th>
                          <th className="px-3 py-2 text-left font-semibold text-gray-700">
                            Local
                          </th>
                          <th className="px-3 py-2 text-center font-semibold text-gray-700">
                            Atual
                          </th>
                          <th className="px-3 py-2 text-center font-semibold text-gray-700">
                            Novo
                          </th>
                          <th className="px-3 py-2 text-center font-semibold text-gray-700">
                            Δ
                          </th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-gray-100">
                        {importPreview.updates.map((upd, i) => {
                          const delta =
                            upd.novaQuantidade - upd.quantidadeAnterior;
                          return (
                            <tr key={i} className="hover:bg-gray-50">
                              <td className="px-3 py-2">
                                <p className="font-medium text-gray-900">
                                  {upd.produto.nome}
                                </p>
                                <p className="text-xs text-gray-500">
                                  {upd.produto.codigo_fornecedor}
                                </p>
                              </td>
                              <td className="px-3 py-2 text-gray-600 text-xs">
                                {upd.localNome}
                              </td>
                              <td className="px-3 py-2 text-center text-gray-600">
                                {upd.quantidadeAnterior}
                              </td>
                              <td className="px-3 py-2 text-center font-bold text-gray-900">
                                {upd.novaQuantidade}
                              </td>
                              <td className="px-3 py-2 text-center">
                                <span
                                  className={`font-semibold ${delta > 0 ? "text-green-600" : delta < 0 ? "text-red-600" : "text-gray-400"}`}
                                >
                                  {delta > 0 ? "+" : ""}
                                  {delta}
                                </span>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>

                    {importPreview.skipped.length > 0 && (
                      <div className="mt-4">
                        <p className="text-sm font-semibold text-amber-700 mb-2">
                          ⚠️ Linhas ignoradas:
                        </p>
                        {importPreview.skipped.map((s, i) => (
                          <p
                            key={i}
                            className="text-xs text-amber-600 bg-amber-50 px-3 py-1 rounded mb-1"
                          >
                            {s.codigo ? `Código: ${s.codigo} — ` : ""}
                            {s.motivo}
                          </p>
                        ))}
                      </div>
                    )}
                  </div>
                  <div className="p-6 border-t border-gray-200 flex gap-3 justify-end">
                    <button
                      onClick={() => setImportPreview(null)}
                      className="px-5 py-2 rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-50 transition"
                    >
                      Cancelar
                    </button>
                    <button
                      onClick={handleConfirmImport}
                      disabled={saving}
                      className="px-5 py-2 rounded-lg bg-blue-800 text-white font-semibold hover:bg-blue-900 disabled:bg-gray-400 transition flex items-center gap-2"
                    >
                      {saving ? (
                        <>
                          <div className="animate-spin rounded-full h-4 w-4 border-b-2 border-white"></div>
                          Importando...
                        </>
                      ) : (
                        <>✓ Confirmar Importação</>
                      )}
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* Header */}
            <div className="flex items-center justify-between mb-6">
              <h2 className="text-3xl font-bold text-gray-800">
                Gestão de Estoque
              </h2>
              <div className="flex gap-2">
                <button
                  onClick={() => fileInputRef.current?.click()}
                  disabled={uploadingFile}
                  className="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 disabled:bg-gray-400 transition flex items-center gap-2"
                >
                  <LucideUpload size={18} />
                  {uploadingFile ? "Lendo arquivo..." : "Importar Excel"}
                </button>
                <button
                  onClick={handleExport}
                  className="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition flex items-center gap-2"
                >
                  <LucideDownload size={18} />
                  Exportar Excel
                </button>
              </div>
            </div>

            <input
              ref={fileInputRef}
              type="file"
              accept=".xlsx,.xls"
              onChange={handleFileUpload}
              className="hidden"
            />

            {/* Tip about Excel format */}
            <div className="mb-4 bg-blue-50 border border-blue-200 rounded-lg px-4 py-3 text-xs text-blue-700">
              <strong>📋 Formato da planilha de importação:</strong> A planilha
              deve ter colunas <strong>Código</strong> (código do produto) e{" "}
              <strong>Quantidade</strong> (saldo). Opcionalmente, a coluna{" "}
              <strong>Local</strong> define para qual local importar; sem ela,
              aplica a todos os locais.
            </div>

            {/* Filters */}
            <div className="flex gap-4 mb-4">
              <div className="relative flex-1 max-w-sm">
                <LucideSearch
                  className="absolute left-3 top-2.5 text-gray-400"
                  size={18}
                />
                <input
                  type="text"
                  value={searchEstoque}
                  onChange={(e) => setSearchEstoque(e.target.value)}
                  placeholder="Buscar por código, nome ou marca..."
                  className="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm"
                />
              </div>
              {locais.length > 1 && (
                <select
                  value={filterLocal}
                  onChange={(e) => setFilterLocal(e.target.value)}
                  className="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm"
                >
                  <option value="">Todos os locais</option>
                  {locais.map((l) => (
                    <option key={l.id} value={l.id}>
                      {l.nome}
                    </option>
                  ))}
                </select>
              )}
            </div>

            {/* Table */}
            <div className="bg-white rounded-lg border border-gray-200 overflow-hidden">
              <div className="overflow-x-auto">
                <table className="w-full text-sm">
                  <thead className="bg-gray-50 border-b border-gray-200">
                    <tr>
                      <th className="px-4 py-3 text-left font-semibold text-gray-700 w-32">
                        Código
                      </th>
                      <th className="px-4 py-3 text-left font-semibold text-gray-700">
                        Descrição
                      </th>
                      <th className="px-4 py-3 text-left font-semibold text-gray-700 w-28">
                        Marca
                      </th>
                      <th className="px-4 py-3 text-center font-semibold text-gray-700 w-20">
                        Un.
                      </th>
                      {visibleLocais.map((local) => (
                        <th
                          key={local.id}
                          className="px-4 py-3 text-center font-semibold text-gray-700 min-w-36"
                        >
                          {local.nome}
                        </th>
                      ))}
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-gray-200">
                    {filteredProdutos.map((produto) => (
                      <tr
                        key={produto.id}
                        className="hover:bg-blue-50 transition"
                      >
                        <td className="px-4 py-3 font-mono text-xs text-gray-700">
                          {produto.codigo_fornecedor}
                        </td>
                        <td className="px-4 py-3 text-gray-900 font-medium">
                          {produto.nome}
                        </td>
                        <td className="px-4 py-3 text-gray-600 text-xs">
                          {produto.marca}
                        </td>
                        <td className="px-4 py-3 text-center text-gray-500 text-xs">
                          {produto.unidade}
                        </td>
                        {visibleLocais.map((local) => {
                          const estoqueItem = getEstoqueItem(
                            produto.id,
                            local.id,
                          );
                          const key = changeKey(produto.id, local.id);
                          const qty = getCurrentQty(produto.id, local.id);
                          const minQty = estoqueItem?.quantidade_minima ?? 0;
                          const isDirty = changes[key] !== undefined;

                          let badgeColor = "bg-green-100 text-green-800";
                          if (qty === 0) badgeColor = "bg-red-100 text-red-800";
                          else if (qty < minQty)
                            badgeColor = "bg-amber-100 text-amber-800";

                          return (
                            <td key={local.id} className="px-4 py-3">
                              <div className="flex items-center justify-center gap-1">
                                <button
                                  onClick={() => handleStep(produto, local, -1)}
                                  className="w-7 h-7 rounded-md border border-gray-300 bg-white hover:bg-gray-100 text-gray-600 font-bold text-lg leading-none flex items-center justify-center transition"
                                  title="Diminuir 1"
                                >
                                  −
                                </button>
                                <input
                                  type="number"
                                  min="0"
                                  value={qty}
                                  onChange={(e) =>
                                    handleQtyChange(
                                      produto,
                                      local,
                                      e.target.value,
                                    )
                                  }
                                  className={`w-16 px-1 py-1 border-2 rounded text-center font-semibold text-sm outline-none focus:ring-2 focus:ring-blue-500 transition ${isDirty ? "border-blue-400 bg-blue-50" : `border-transparent ${badgeColor}`}`}
                                />
                                <button
                                  onClick={() => handleStep(produto, local, 1)}
                                  className="w-7 h-7 rounded-md border border-gray-300 bg-white hover:bg-gray-100 text-gray-600 font-bold text-lg leading-none flex items-center justify-center transition"
                                  title="Aumentar 1"
                                >
                                  +
                                </button>
                              </div>
                              {!estoqueItem && !isDirty && (
                                <p className="text-center text-xs text-gray-400 mt-0.5">
                                  sem registro
                                </p>
                              )}
                            </td>
                          );
                        })}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>

              {filteredProdutos.length === 0 && (
                <div className="text-center py-12">
                  <LucidePackage
                    size={48}
                    className="mx-auto text-gray-300 mb-3"
                  />
                  <p className="text-gray-500">Nenhum produto encontrado</p>
                </div>
              )}
            </div>

            {/* Sticky save bar */}
            {pendingCount > 0 && (
              <div className="fixed bottom-6 left-1/2 -translate-x-1/2 bg-white border border-gray-200 shadow-2xl rounded-xl px-6 py-4 flex items-center gap-4 z-40">
                <div className="text-sm text-gray-700">
                  <span className="font-bold text-blue-800">
                    {pendingCount}
                  </span>{" "}
                  alteração(ões) pendente(s)
                </div>
                <button
                  onClick={() => {
                    setChanges({});
                    fetchData();
                  }}
                  className="px-4 py-2 rounded-lg border border-gray-300 text-gray-600 hover:bg-gray-50 transition text-sm"
                >
                  Descartar
                </button>
                <button
                  onClick={handleSaveChanges}
                  disabled={saving}
                  className="px-5 py-2 rounded-lg bg-blue-800 text-white font-semibold hover:bg-blue-900 disabled:bg-gray-400 transition flex items-center gap-2 text-sm"
                >
                  {saving ? (
                    <>
                      <div className="animate-spin rounded-full h-4 w-4 border-b-2 border-white"></div>
                      Salvando...
                    </>
                  ) : (
                    <>
                      <LucideSave size={16} />
                      Salvar Alterações
                    </>
                  )}
                </button>
              </div>
            )}
          </div>
        );
      }

      // Configurações Component (Admin Only)
      function Configuracoes() {
        const [usuarios, setUsuarios] = useState([]);
        const [loading, setLoading] = useState(true);
        const [locais, setLocais] = useState([]);
        const [editingOrcamento, setEditingOrcamento] = useState(null);
        const [novoOrcamento, setNovoOrcamento] = useState("");
        const [savingOrcamento, setSavingOrcamento] = useState(false);
        const [showNovoLocal, setShowNovoLocal] = useState(false);
        const [novoLocal, setNovoLocal] = useState({
          nome: "",
          codigo_contrato: "",
          centro_custo: "",
          orcamento_mensal: "",
        });
        const [savingLocal, setSavingLocal] = useState(false);

        const [showNovoUsuario, setShowNovoUsuario] = useState(false);
        const [novoUsuario, setNovoUsuario] = useState({
          nome: "",
          email: "",
          password: "",
          role: "cliente",
          local_id: "",
        });
        const [savingUsuario, setSavingUsuario] = useState(false);
        const [editingUserLocal, setEditingUserLocal] = useState(null); // Stores user.id being edited
        const [selectedLocalForUser, setSelectedLocalForUser] = useState(""); // Stores the new local_id for a user

        useEffect(() => {
          fetchData();
        }, []);

        const fetchData = async () => {
          try {
            setLoading(true);

            const { data: usersData, error: usersError } = await supabase
              .from("perfis")
              .select("*, locais(nome)") // Fetch local name along with user profile
              .eq("ativo", true)
              .order("nome");

            if (usersError) throw usersError;

            const { data: locaisData, error: locaisError } = await supabase
              .from("locais")
              .select("*")
              .eq("ativo", true);

            if (locaisError) throw locaisError;

            setUsuarios(usersData || []);
            setLocais(locaisData || []);
          } catch (err) {
            console.error("Error fetching data:", err);
            alert(`Erro ao carregar dados: ${err.message}`);
          } finally {
            setLoading(false);
          }
        };

        const handleToggleRole = async (usuario) => {
          const novoRole = usuario.role === "admin" ? "cliente" : "admin";
          if (
            !confirm(
              `Alterar ${usuario.nome} para ${novoRole === "admin" ? "Administrador" : "Cliente"}?`,
            )
          )
            return;
          try {
            const { error } = await supabase
              .from("perfis")
              .update({ role: novoRole })
              .eq("id", usuario.id);
            if (error) throw error;
            setUsuarios((prev) =>
              prev.map((u) =>
                u.id === usuario.id ? { ...u, role: novoRole } : u,
              ),
            );
          } catch (err) {
            alert(`Erro ao alterar role: ${err.message}`);
          }
        };

        const handleDesativarUsuario = async (usuario) => {
          if (
            !confirm(
              `Desativar o usuário ${usuario.nome}? Ele não conseguirá mais acessar o sistema.`,
            )
          )
            return;
          try {
            const { error } = await supabase
              .from("perfis")
              .update({ ativo: false })
              .eq("id", usuario.id);
            if (error) throw error;
            setUsuarios((prev) => prev.filter((u) => u.id !== usuario.id));
          } catch (err) {
            alert(`Erro ao desativar usuário: ${err.message}`);
          }
        };

        const handleSaveOrcamento = async (localId) => {
          const valor = parseFloat(novoOrcamento.replace(",", "."));
          if (isNaN(valor) || valor <= 0) {
            alert("Informe um valor válido");
            return;
          }
          setSavingOrcamento(true);
          try {
            const { error } = await supabase
              .from("locais")
              .update({ orcamento_mensal: valor })
              .eq("id", localId);
            if (error) throw error;
            setLocais((prev) =>
              prev.map((l) =>
                l.id === localId ? { ...l, orcamento_mensal: valor } : l,
              ),
            );
            setEditingOrcamento(null);
            setNovoOrcamento("");
          } catch (err) {
            alert(`Erro ao salvar orçamento: ${err.message}`);
          } finally {
            setSavingOrcamento(false);
          }
        };

        const handleCriarLocal = async (e) => {
          e.preventDefault();
          if (!novoLocal.nome || !novoLocal.codigo_contrato) {
            alert("Preencha nome e código do contrato");
            return;
          }
          setSavingLocal(true);
          try {
            const { data, error } = await supabase
              .from("locais")
              .insert([
                {
                  ...novoLocal,
                  orcamento_mensal: parseFloat(novoLocal.orcamento_mensal) || 0,
                  ativo: true,
                },
              ])
              .select()
              .single();
            if (error) throw error;
            setLocais((prev) => [...prev, data]);
            setNovoLocal({
              nome: "",
              codigo_contrato: "",
              centro_custo: "",
              orcamento_mensal: "",
            });
            setShowNovoLocal(false);
            alert("Local criado com sucesso!");
          } catch (err) {
            alert(`Erro ao criar local: ${err.message}`);
          } finally {
            setSavingLocal(false);
          }
        };

        const handleCriarUsuario = async (e) => {
          e.preventDefault();
          if (
            !novoUsuario.nome ||
            !novoUsuario.email ||
            !novoUsuario.password ||
            !novoUsuario.role ||
            !novoUsuario.local_id
          ) {
            alert("Preencha todos os campos obrigatórios para o novo usuário.");
            return;
          }
          setSavingUsuario(true);
          try {
            // 1. Create user in Supabase Auth
            const { data: authData, error: authError } =
              await supabase.auth.signUp({
                email: novoUsuario.email,
                password: novoUsuario.password,
                options: {
                  data: {
                    full_name: novoUsuario.nome, // Store full name in auth metadata
                  },
                },
              });

            if (authError) throw authError;
            if (!authData.user)
              throw new Error("User creation failed in auth service.");

            // 2. Insert profile into 'perfis' table
            const { error: profileError } = await supabase
              .from("perfis")
              .insert({
                id: authData.user.id,
                nome: novoUsuario.nome,
                email: novoUsuario.email,
                role: novoUsuario.role,
                local_id: novoUsuario.local_id,
                ativo: true,
              });

            if (profileError) {
              // If profile insertion fails, consider deleting the auth user to prevent orphaned accounts
              await supabase.auth.admin.deleteUser(authData.user.id);
              throw profileError;
            }

            alert(
              "Usuário criado com sucesso! Um e-mail de confirmação foi enviado.",
            );
            setNovoUsuario({
              nome: "",
              email: "",
              password: "",
              role: "cliente",
              local_id: "",
            });
            setShowNovoUsuario(false);
            fetchData(); // Refresh user list
          } catch (err) {
            console.error("Error creating user:", err);
            alert(`Erro ao criar usuário: ${err.message}`);
          } finally {
            setSavingUsuario(false);
          }
        };

        const handleSaveUserLocal = async (userId) => {
          if (!selectedLocalForUser) {
            alert("Selecione um local para o usuário.");
            return;
          }
          try {
            const { error } = await supabase
              .from("perfis")
              .update({ local_id: selectedLocalForUser })
              .eq("id", userId);
            if (error) throw error;
            alert("Local do usuário atualizado com sucesso!");
            setEditingUserLocal(null);
            setSelectedLocalForUser("");
            fetchData(); // Refresh user list to show updated local name
          } catch (err) {
            alert(`Erro ao atualizar local do usuário: ${err.message}`);
          }
        };

        if (loading) {
          return (
            <div className="flex items-center justify-center h-screen">
              <div className="text-center">
                <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-800 mx-auto mb-4"></div>
                <p className="text-gray-600">Carregando configurações...</p>
              </div>
            </div>
          );
        }

        return (
          <div className="p-6 max-w-6xl mx-auto">
            <h2 className="text-3xl font-bold text-gray-800 mb-6">
              Configurações
            </h2>

            {/* Users Section */}
            <div className="bg-white rounded-lg border border-gray-200 p-6 mb-6">
              <div className="flex items-center justify-between mb-4">
                <h3 className="text-xl font-semibold text-gray-800">
                  Usuários
                </h3>
                <button
                  onClick={() => setShowNovoUsuario(!showNovoUsuario)}
                  className="flex items-center gap-2 bg-blue-800 text-white px-4 py-2 rounded-lg hover:bg-blue-900 transition text-sm font-medium"
                >
                  <LucideUserPlus size={16} />
                  Novo Usuário
                </button>
              </div>

              {/* Formulário Novo Usuário */}
              {showNovoUsuario && (
                <form
                  onSubmit={handleCriarUsuario}
                  className="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-4"
                >
                  <h4 className="font-semibold text-blue-900 mb-3">
                    Adicionar Novo Usuário
                  </h4>
                  <div className="grid grid-cols-2 gap-3 mb-3">
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">
                        Nome Completo *
                      </label>
                      <input
                        type="text"
                        value={novoUsuario.nome}
                        onChange={(e) =>
                          setNovoUsuario((prev) => ({
                            ...prev,
                            nome: e.target.value,
                          }))
                        }
                        className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm"
                        placeholder="Ex: João da Silva"
                        required
                      />
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">
                        Email *
                      </label>
                      <input
                        type="email"
                        value={novoUsuario.email}
                        onChange={(e) =>
                          setNovoUsuario((prev) => ({
                            ...prev,
                            email: e.target.value,
                          }))
                        }
                        className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm"
                        placeholder="exemplo@email.com"
                        required
                      />
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">
                        Senha *
                      </label>
                      <input
                        type="password"
                        value={novoUsuario.password}
                        onChange={(e) =>
                          setNovoUsuario((prev) => ({
                            ...prev,
                            password: e.target.value,
                          }))
                        }
                        className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm"
                        placeholder="Mínimo 6 caracteres"
                        required
                      />
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">
                        Role *
                      </label>
                      <select
                        value={novoUsuario.role}
                        onChange={(e) =>
                          setNovoUsuario((prev) => ({
                            ...prev,
                            role: e.target.value,
                          }))
                        }
                        className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm"
                        required
                      >
                        <option value="cliente">Cliente</option>
                        <option value="admin">Administrador</option>
                      </select>
                    </div>
                    <div className="col-span-2">
                      <label className="block text-sm font-medium text-gray-700 mb-1">
                        Local de Atuação *
                      </label>
                      <select
                        value={novoUsuario.local_id}
                        onChange={(e) =>
                          setNovoUsuario((prev) => ({
                            ...prev,
                            local_id: e.target.value,
                          }))
                        }
                        className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm"
                        required
                      >
                        <option value="">Selecione um local</option>
                        {locais.map((local) => (
                          <option key={local.id} value={local.id}>
                            {local.nome}
                          </option>
                        ))}
                      </select>
                    </div>
                  </div>
                  <div className="flex gap-2">
                    <button
                      type="submit"
                      disabled={savingUsuario}
                      className="bg-blue-800 text-white px-4 py-2 rounded-lg hover:bg-blue-900 disabled:bg-gray-400 transition text-sm font-medium"
                    >
                      {savingUsuario ? "Salvando..." : "Criar Usuário"}
                    </button>
                    <button
                      type="button"
                      onClick={() => {
                        setShowNovoUsuario(false);
                        setNovoUsuario({
                          nome: "",
                          email: "",
                          password: "",
                          role: "cliente",
                          local_id: "",
                        });
                      }}
                      className="bg-gray-200 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-300 transition text-sm font-medium"
                    >
                      Cancelar
                    </button>
                  </div>
                </form>
              )}

              <div className="space-y-3">
                {usuarios.map((usuario) => (
                  <div
                    key={usuario.id}
                    className="flex items-center justify-between p-4 bg-gray-50 rounded-lg border border-gray-200"
                  >
                    <div>
                      <p className="font-medium text-gray-900">
                        {usuario.nome}
                      </p>
                      <p className="text-sm text-gray-600">{usuario.email}</p>
                      <p className="text-xs text-gray-500">
                        Local: {usuario.locais?.nome || "Nenhum"}
                      </p>
                    </div>
                    <div className="flex items-center gap-3">
                      {editingUserLocal === usuario.id ? (
                        <div className="flex items-center gap-2">
                          <select
                            value={selectedLocalForUser}
                            onChange={(e) =>
                              setSelectedLocalForUser(e.target.value)
                            }
                            className="px-2 py-1 border border-gray-300 rounded text-sm focus:ring-2 focus:ring-blue-500 outline-none"
                          >
                            <option value="">Selecione</option>
                            {locais.map((local) => (
                              <option key={local.id} value={local.id}>
                                {local.nome}
                              </option>
                            ))}
                          </select>
                          <button
                            onClick={() => handleSaveUserLocal(usuario.id)}
                            className="bg-green-600 text-white px-3 py-1 rounded text-sm hover:bg-green-700 transition"
                          >
                            Salvar
                          </button>
                          <button
                            onClick={() => {
                              setEditingUserLocal(null);
                              setSelectedLocalForUser("");
                            }}
                            className="bg-gray-300 text-gray-700 px-3 py-1 rounded text-sm hover:bg-gray-400 transition"
                          >
                            ✕
                          </button>
                        </div>
                      ) : (
                        <button
                          onClick={() => {
                            setEditingUserLocal(usuario.id);
                            setSelectedLocalForUser(usuario.local_id || "");
                          }}
                          className="text-sm px-3 py-1 rounded border border-gray-300 text-gray-700 hover:bg-gray-100 transition"
                          title="Alterar local do usuário"
                        >
                          Alterar Local
                        </button>
                      )}

                      <span
                        className={`text-sm font-medium px-3 py-1 rounded border ${
                          usuario.role === "admin"
                            ? "bg-blue-50 text-blue-800 border-blue-200"
                            : "bg-gray-50 text-gray-700 border-gray-300"
                        }`}
                      >
                        {usuario.role === "admin" ? "Administrador" : "Cliente"}
                      </span>
                      <button
                        onClick={() => handleToggleRole(usuario)}
                        className="text-sm px-3 py-1 rounded border border-blue-300 text-blue-700 hover:bg-blue-50 transition"
                        title="Alternar entre Admin e Cliente"
                      >
                        Alterar Role
                      </button>
                      <button
                        onClick={() => handleDesativarUsuario(usuario)}
                        className="text-sm px-3 py-1 rounded border border-red-300 text-red-700 hover:bg-red-50 transition"
                        title="Desativar usuário"
                      >
                        Desativar
                      </button>
                    </div>
                  </div>
                ))}
                {usuarios.length === 0 && (
                  <p className="text-gray-500 text-sm">
                    Nenhum usuário ativo encontrado.
                  </p>
                )}
              </div>
            </div>

            {/* Locais Section */}
            <div className="bg-white rounded-lg border border-gray-200 p-6">
              <div className="flex items-center justify-between mb-4">
                <h3 className="text-xl font-semibold text-gray-800">Locais</h3>
                <button
                  onClick={() => setShowNovoLocal(!showNovoLocal)}
                  className="flex items-center gap-2 bg-blue-800 text-white px-4 py-2 rounded-lg hover:bg-blue-900 transition text-sm font-medium"
                >
                  <LucidePlus size={16} />
                  Novo Local
                </button>
              </div>

              {/* Formulário Novo Local */}
              {showNovoLocal && (
                <form
                  onSubmit={handleCriarLocal}
                  className="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-4"
                >
                  <h4 className="font-semibold text-blue-900 mb-3">
                    Adicionar Novo Local
                  </h4>
                  <div className="grid grid-cols-2 gap-3 mb-3">
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">
                        Nome *
                      </label>
                      <input
                        type="text"
                        value={novoLocal.nome}
                        onChange={(e) =>
                          setNovoLocal((prev) => ({
                            ...prev,
                            nome: e.target.value,
                          }))
                        }
                        className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm"
                        placeholder="Ex: Bridgestone em Camaçari"
                        required
                      />
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">
                        Código do Contrato *
                      </label>
                      <input
                        type="text"
                        value={novoLocal.codigo_contrato}
                        onChange={(e) =>
                          setNovoLocal((prev) => ({
                            ...prev,
                            codigo_contrato: e.target.value,
                          }))
                        }
                        className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm"
                        placeholder="Ex: FM2C"
                        required
                      />
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">
                        Centro de Custo
                      </label>
                      <input
                        type="text"
                        value={novoLocal.centro_custo}
                        onChange={(e) =>
                          setNovoLocal((prev) => ({
                            ...prev,
                            centro_custo: e.target.value,
                          }))
                        }
                        className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm"
                        placeholder="Ex: CC-001"
                      />
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">
                        Orçamento Mensal (R$)
                      </label>
                      <input
                        type="number"
                        min="0"
                        step="0.01"
                        value={novoLocal.orcamento_mensal}
                        onChange={(e) =>
                          setNovoLocal((prev) => ({
                            ...prev,
                            orcamento_mensal: e.target.value,
                          }))
                        }
                        className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm"
                        placeholder="Ex: 20000"
                      />
                    </div>
                  </div>
                  <div className="flex gap-2">
                    <button
                      type="submit"
                      disabled={savingLocal}
                      className="bg-blue-800 text-white px-4 py-2 rounded-lg hover:bg-blue-900 disabled:bg-gray-400 transition text-sm font-medium"
                    >
                      {savingLocal ? "Salvando..." : "Criar Local"}
                    </button>
                    <button
                      type="button"
                      onClick={() => {
                        setShowNovoLocal(false);
                        setNovoLocal({
                          nome: "",
                          codigo_contrato: "",
                          centro_custo: "",
                          orcamento_mensal: "",
                        });
                      }}
                      className="bg-gray-200 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-300 transition text-sm font-medium"
                    >
                      Cancelar
                    </button>
                  </div>
                </form>
              )}

              <div className="space-y-3">
                {locais.map((local) => (
                  <div
                    key={local.id}
                    className="p-4 bg-gray-50 rounded-lg border border-gray-200"
                  >
                    <div className="flex items-start justify-between">
                      <div>
                        <p className="font-medium text-gray-900">
                          {local.nome}
                        </p>
                        <p className="text-sm text-gray-600">
                          Código: {local.codigo_contrato}
                        </p>
                        <p className="text-sm text-gray-600">
                          CC: {local.centro_custo}
                        </p>
                      </div>
                      <div className="text-right">
                        {editingOrcamento === local.id ? (
                          <div className="flex items-center gap-2">
                            <span className="text-sm text-gray-600">R$</span>
                            <input
                              type="number"
                              min="0"
                              step="0.01"
                              value={novoOrcamento}
                              onChange={(e) => setNovoOrcamento(e.target.value)}
                              className="w-32 px-2 py-1 border border-gray-300 rounded text-sm text-right focus:ring-2 focus:ring-blue-500 outline-none"
                              placeholder="0.00"
                              autoFocus
                            />
                            <button
                              onClick={() => handleSaveOrcamento(local.id)}
                              disabled={savingOrcamento}
                              className="bg-green-600 text-white px-3 py-1 rounded text-sm hover:bg-green-700 transition disabled:bg-gray-400"
                            >
                              {savingOrcamento ? "..." : "Salvar"}
                            </button>
                            <button
                              onClick={() => {
                                setEditingOrcamento(null);
                                setNovoOrcamento("");
                              }}
                              className="bg-gray-300 text-gray-700 px-3 py-1 rounded text-sm hover:bg-gray-400 transition"
                            >
                              ✕
                            </button>
                          </div>
                        ) : (
                          <div className="flex items-center gap-2">
                            <div>
                              <p className="text-sm text-gray-600">
                                Orçamento mensal
                              </p>
                              <p className="font-semibold text-gray-900">
                                {formatCurrency(local.orcamento_mensal)}
                              </p>
                            </div>
                            <button
                              onClick={() => {
                                setEditingOrcamento(local.id);
                                setNovoOrcamento(local.orcamento_mensal || "");
                              }}
                              className="text-sm px-3 py-1 rounded border border-gray-300 text-gray-700 hover:bg-gray-100 transition"
                              title="Editar orçamento"
                            >
                              ✏️ Editar
                            </button>
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                ))}
                {locais.length === 0 && (
                  <p className="text-gray-500 text-sm">
                    Nenhum local encontrado.
                  </p>
                )}
              </div>
            </div>
          </div>
        );
      }

      // Main App Component
      function App() {
        const [user, setUser] = useState(null);
        const [userRole, setUserRole] = useState(null);
        const [loading, setLoading] = useState(true);
        const [currentPage, setCurrentPage] = useState("nova-requisicao");

        useEffect(() => {
          checkAuth();
          const { data: authListener } = supabase.auth.onAuthStateChange(
            (event, session) => {
              if (session?.user) {
                setUser(session.user);
                fetchUserRole(session.user.email);
              } else {
                setUser(null);
                setUserRole(null);
              }
            },
          );

          return () => {
            authListener?.subscription?.unsubscribe();
          };
        }, []);

        const checkAuth = async () => {
          try {
            const {
              data: { user: authUser },
            } = await supabase.auth.getUser();
            if (authUser) {
              setUser(authUser);
              fetchUserRole(authUser.email);
            }
          } catch (err) {
            console.error("Error checking auth:", err);
          } finally {
            setLoading(false);
          }
        };

        const fetchUserRole = async (email) => {
          try {
            const { data } = await supabase
              .from("perfis")
              .select("role")
              .eq("email", email)
              .single();

            if (data) setUserRole(data.role);
          } catch (err) {
            console.error("Error fetching user role:", err);
          }
        };

        const handleLogout = async () => {
          try {
            await supabase.auth.signOut();
            setUser(null);
            setUserRole(null);
            setCurrentPage("nova-requisicao");
          } catch (err) {
            console.error("Error logging out:", err);
          }
        };

        if (loading) {
          return (
            <div className="flex items-center justify-center h-screen bg-gradient-to-br from-blue-50 to-blue-100">
              <div className="text-center">
                <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-800 mx-auto mb-4"></div>
                <p className="text-gray-600">Carregando sistema...</p>
              </div>
            </div>
          );
        }

        if (!user) {
          return <LoginPage onLogin={setUser} />;
        }

        return (
          <div className="flex h-screen bg-gray-100">
            <Sidebar
              user={user}
              userRole={userRole}
              onLogout={handleLogout}
              currentPage={currentPage}
              onPageChange={setCurrentPage}
            />

            <main className="flex-1 overflow-y-auto">
              {currentPage === "nova-requisicao" && (
                <NovaRequisicao user={user} userRole={userRole} />
              )}
              {currentPage === "meus-pedidos" && (
                <MeusPedidos user={user} userRole={userRole} />
              )}
              {currentPage === "estoque" && userRole === "admin" && <Estoque />}
              {currentPage === "configuracoes" && userRole === "admin" && (
                <Configuracoes />
              )}
            </main>
          </div>
        );
      }

      // Render app
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
