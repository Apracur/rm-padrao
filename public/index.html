                        </div>
                      </div>
                      <div className="flex items-center justify-between mt-3 pt-3 border-t border-gray-100 gap-3">
                        <div className="flex items-center gap-2">
                          <button
                            type="button"
                            onClick={() =>
                              handleQuantityChange(produto.id, Math.max(0, qty - 1))
                            }
                            className="w-9 h-9 rounded-md border border-gray-300 bg-white text-gray-700 font-bold text-lg leading-none flex items-center justify-center active:bg-gray-100"
                            aria-label="Diminuir"
                          >
                            −
                          </button>
                          <input
                            type="number"
                            min="0"
                            value={qty}
                            onChange={(e) =>
                              handleQuantityChange(produto.id, e.target.value)
                            }
                            className="w-16 h-9 px-2 border border-gray-300 rounded text-center focus:ring-2 focus:ring-blue-500 outline-none"
                          />
                          <button
                            type="button"
                            onClick={() =>
                              handleQuantityChange(produto.id, qty + 1)
                            }
                            className="w-9 h-9 rounded-md border border-gray-300 bg-white text-gray-700 font-bold text-lg leading-none flex items-center justify-center active:bg-gray-100"
                            aria-label="Aumentar"
                          >
                            +
                          </button>
                        </div>
                        <div className="text-right">
                          <p className="text-xs text-gray-500">Subtotal</p>
                          <p className="font-semibold text-gray-900 text-sm">
                            {formatCurrency(subtotal)}
                          </p>
                        </div>
                      </div>
                    </div>
                  );
                })}

                {filteredProdutos.length === 0 && (
                  <div className="bg-white rounded-lg border border-gray-200 text-center py-10">
                    <LucidePackage
                      size={40}
                      className="mx-auto text-gray-300 mb-3"
                    />
                    <p className="text-gray-500 text-sm">Nenhum produto encontrado</p>
                  </div>
                )}
              </div>

              {/* Submit Button */}
              <div className="flex gap-4">
                <button
                  type="submit"
                  disabled={submitting || Object.keys(cartItems).length === 0}
                  className="flex-1 bg-blue-800 text-white py-3 rounded-lg font-semibold hover:bg-blue-900 disabled:bg-gray-400 transition duration-200 flex items-center justify-center gap-2"
                >
                  {submitting ? (
                    <>
                      <div className="animate-spin rounded-full h-5 w-5 border-b-2 border-white"></div>
                      Processando...
                    </>
                  ) : (
                    <>
                      <LucideCheck size={20} />
                      Finalizar Pedido
                    </>
                  )}
                </button>
              </div>
            </form>
          </div>
        );
      }

      // Meus Pedidos Component
      function MeusPedidos({ user, userRole }) {
        const [pedidos, setPedidos] = useState([]);
        const [loading, setLoading] = useState(true);
        const [expandedId, setExpandedId] = useState(null);
        const [itensPedido, setItensPedido] = useState({});
        const [changeStatus, setChangeStatus] = useState({});
        const [editingId, setEditingId] = useState(null);
        const [editQuantities, setEditQuantities] = useState({});
        const [editObservacoes, setEditObservacoes] = useState("");
        const [savingEdit, setSavingEdit] = useState(false);
        const [produtosCatalogo, setProdutosCatalogo] = useState([]);
        const [produtosLoaded, setProdutosLoaded] = useState(false);
        const [loadingProdutos, setLoadingProdutos] = useState(false);
        const [addedItems, setAddedItems] = useState({});
        const [addSearchTerm, setAddSearchTerm] = useState("");

        useEffect(() => {
          if (user) {
            fetchPedidos();
          }
        }, [user, userRole]);

        const fetchPedidos = async () => {
          try {
            setLoading(true);
            let query = supabase
              .from("pedidos")
              .select("*, locais(nome)")
              .order("created_at", { ascending: false });

            if (userRole !== "admin") {
              const {
                data: { user: authUser },
              } = await supabase.auth.getUser();
              const { data: perfil } = await supabase
                .from("perfis")
                .select("local_id")
                .eq("email", authUser.email)
                .maybeSingle();
              if (perfil?.local_id) {
                query = query.eq("local_id", perfil.local_id);
              } else {
                query = query.eq("usuario_id", authUser.id);
              }
            }

            const { data, error } = await query;
            if (error) throw error;

            const pedidosData = data || [];
            const userIds = [
              ...new Set(pedidosData.map((p) => p.usuario_id).filter(Boolean)),
            ];
            let perfisById = {};
            if (userIds.length > 0) {
              const { data: perfisData } = await supabase
                .from("perfis")
                .select("id, nome, email")
                .in("id", userIds);
              (perfisData || []).forEach((p) => {
                perfisById[p.id] = p;
              });
            }
            setPedidos(
              pedidosData.map((p) => ({
                ...p,
                perfis: perfisById[p.usuario_id] || null,
              })),
            );
          } catch (err) {
            console.error("Error fetching pedidos:", err);
          } finally {
            setLoading(false);
          }
        };

        const fetchItensPedido = async (pedidoId) => {
          try {
            const { data, error } = await supabase
              .from("itens_pedido")
              .select("*, produtos(nome, codigo_interno, marca, unidade, imagem_url)")
              .eq("pedido_id", pedidoId);

            if (error) throw error;
            setItensPedido((prev) => ({
              ...prev,
              [pedidoId]: data || [],
            }));
          } catch (err) {
            console.error("Error fetching itens:", err);
          }
        };

        const handleExpandClick = (pedidoId) => {
          if (expandedId === pedidoId) {
            setExpandedId(null);
            if (editingId === pedidoId) handleCancelEdit();
          } else {
            setExpandedId(pedidoId);
            if (!itensPedido[pedidoId]) {
              fetchItensPedido(pedidoId);
            }
          }
        };

        const handleDeletePedido = async (pedido) => {
          const confirmMsg =
            `Excluir o pedido ${pedido.numero_pedido}?\n\n` +
            `Local: ${pedido.locais?.nome || "-"}\n` +
            `Valor: ${formatCurrency(pedido.valor_total)}\n\n` +
            `Esta ação é irreversível e removerá também todos os itens do pedido.`;
          if (!window.confirm(confirmMsg)) return;
          try {
            const { error } = await supabase
              .from("pedidos")
              .delete()
              .eq("id", pedido.id);
            if (error) throw error;
            setPedidos((prev) => prev.filter((p) => p.id !== pedido.id));
            setItensPedido((prev) => {
              const updated = { ...prev };
              delete updated[pedido.id];
              return updated;
            });
            if (expandedId === pedido.id) setExpandedId(null);
          } catch (err) {
            console.error("Error deleting pedido:", err);
            alert("Erro ao excluir pedido: " + err.message);
          }
        };

        const ensureProdutosLoaded = async () => {
          if (produtosLoaded || loadingProdutos) return;
          setLoadingProdutos(true);
          try {
            const { data, error } = await supabase
              .from("produtos")
              .select("*")
              .eq("ativo", true);
            if (error) throw error;
            setProdutosCatalogo(data || []);
            setProdutosLoaded(true);
          } catch (err) {
            console.warn("Não foi possível carregar catálogo:", err);
          } finally {
            setLoadingProdutos(false);
          }
        };

        const handleStartEdit = (pedido) => {
          const items = itensPedido[pedido.id] || [];
          const quantities = {};
          items.forEach((it) => {
            quantities[it.id] = it.quantidade;
          });
          setEditingId(pedido.id);
          setEditQuantities(quantities);
          setEditObservacoes(pedido.observacoes || "");
          setAddedItems({});
          setAddSearchTerm("");
          ensureProdutosLoaded();
        };

        const handleCancelEdit = () => {
          setEditingId(null);
          setEditQuantities({});
          setEditObservacoes("");
          setAddedItems({});
          setAddSearchTerm("");
        };

        const handleEditQtyChange = (itemId, value) => {
          const qty = Math.max(0, parseInt(value) || 0);
          setEditQuantities((prev) => ({ ...prev, [itemId]: qty }));
        };

        const handleAddProduto = (produto) => {
          const existingItems = itensPedido[editingId] || [];
          const alreadyInPedido = existingItems.find(
            (it) => it.produto_id === produto.id,
          );
          if (alreadyInPedido) {
            const currentQty =
              editQuantities[alreadyInPedido.id] ?? alreadyInPedido.quantidade;
            setEditQuantities((prev) => ({
              ...prev,
              [alreadyInPedido.id]: currentQty + 1,
            }));
            return;
          }
          setAddedItems((prev) => ({
            ...prev,
            [produto.id]: (prev[produto.id] || 0) + 1,
          }));
        };

        const handleAddedQtyChange = (produtoId, value) => {
          const qty = Math.max(0, parseInt(value) || 0);
          setAddedItems((prev) => {
            if (qty === 0) {
              const updated = { ...prev };
              delete updated[produtoId];
              return updated;
            }
            return { ...prev, [produtoId]: qty };
          });
        };

        const handleSaveEdit = async (pedido) => {
          const items = itensPedido[pedido.id] || [];
          const toDelete = [];
          const toUpdate = [];
          let newValorTotal = 0;

          items.forEach((item) => {
            const newQty = editQuantities[item.id] ?? item.quantidade;
            if (newQty <= 0) {
              toDelete.push(item.id);
            } else {
              const preco_total = item.preco_unitario * newQty;
              newValorTotal += preco_total;
              if (newQty !== item.quantidade) {
                toUpdate.push({ id: item.id, quantidade: newQty, preco_total });
              }
            }
          });

          const newItensRows = [];
          Object.entries(addedItems).forEach(([produtoId, qty]) => {
            if (qty <= 0) return;
            const prod = produtosCatalogo.find((p) => p.id === produtoId);
            if (!prod) return;
            const preco_total = prod.preco_unitario * qty;
            newValorTotal += preco_total;
            newItensRows.push({
              pedido_id: pedido.id,
              produto_id: produtoId,
              quantidade: qty,
              preco_unitario: prod.preco_unitario,
              preco_total,
            });
          });

          const remainingExisting = items.length - toDelete.length;
          if (remainingExisting + newItensRows.length === 0) {
            alert("O pedido precisa ter pelo menos um item. Para remover todos, exclua o pedido.");
            return;
          }

          setSavingEdit(true);
          try {
            if (toDelete.length > 0) {
              const { error } = await supabase
                .from("itens_pedido")
                .delete()
                .in("id", toDelete);
              if (error) throw error;
            }

            for (const upd of toUpdate) {
              const { error } = await supabase
                .from("itens_pedido")
                .update({ quantidade: upd.quantidade, preco_total: upd.preco_total })
                .eq("id", upd.id);
              if (error) throw error;
            }

            let insertedItens = [];
            if (newItensRows.length > 0) {
              const { data, error } = await supabase
                .from("itens_pedido")
                .insert(newItensRows)
                .select(
                  "*, produtos(nome, codigo_interno, marca, unidade, imagem_url)",
                );
              if (error) throw error;
              insertedItens = data || [];
            }

            const { error: pedError } = await supabase
              .from("pedidos")
              .update({
                valor_total: newValorTotal,
                observacoes: editObservacoes,
              })
              .eq("id", pedido.id);
            if (pedError) throw pedError;

            setPedidos((prev) =>
              prev.map((p) =>
                p.id === pedido.id
                  ? { ...p, valor_total: newValorTotal, observacoes: editObservacoes }
                  : p,
              ),
            );
            const updatedExisting = items
              .filter((it) => !toDelete.includes(it.id))
              .map((it) => {
                const newQty = editQuantities[it.id] ?? it.quantidade;
                return newQty !== it.quantidade
                  ? { ...it, quantidade: newQty, preco_total: it.preco_unitario * newQty }
                  : it;
              });
            setItensPedido((prev) => ({
              ...prev,
              [pedido.id]: [...updatedExisting, ...insertedItens],
            }));
            handleCancelEdit();
          } catch (err) {
            console.error("Erro ao salvar edição:", err);
            alert("Erro ao salvar edição: " + err.message);
          } finally {
            setSavingEdit(false);
          }
        };

        const handleStatusChange = async (pedidoId, newStatus) => {
          try {
            const { error } = await supabase
              .from("pedidos")
              .update({ status: newStatus })
              .eq("id", pedidoId);

            if (error) throw error;

            setPedidos((prev) =>
              prev.map((p) =>
                p.id === pedidoId ? { ...p, status: newStatus } : p,
              ),
            );
            setChangeStatus((prev) => {
              const updated = { ...prev };
              delete updated[pedidoId];
              return updated;
            });
          } catch (err) {
            console.error("Error updating status:", err);
            alert("Erro ao atualizar status");
          }
        };

        const getStatusColor = (status) => {
          switch (status) {
            case "pendente":
              return "bg-yellow-100 text-yellow-800 border-yellow-300";
            case "aprovado":
              return "bg-green-100 text-green-800 border-green-300";
            case "entregue":
              return "bg-blue-100 text-blue-800 border-blue-300";
            case "cancelado":
              return "bg-red-100 text-red-800 border-red-300";
            default:
              return "bg-gray-100 text-gray-800 border-gray-300";
          }
        };

        const getStatusLabel = (status) => {
          switch (status) {
            case "pendente":
              return "Pendente";
            case "aprovado":
              return "Aprovado";
            case "entregue":
              return "Entregue";
            case "cancelado":
              return "Cancelado";
            default:
              return status;
          }
        };

        if (loading) {
          return (
            <div className="flex items-center justify-center h-screen">
              <div className="text-center">
                <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-800 mx-auto mb-4"></div>
                <p className="text-gray-600">Carregando pedidos...</p>
              </div>
            </div>
          );
        }

        return (
          <div className="p-4 sm:p-6 max-w-6xl mx-auto">
            <h2 className="text-2xl sm:text-3xl font-bold text-gray-800 mb-6">
              Meus Pedidos
            </h2>

            {pedidos.length === 0 ? (
              <div className="bg-white rounded-lg border border-gray-200 p-12 text-center">
                <LucideFileText
                  size={48}
                  className="mx-auto text-gray-300 mb-3"
                />
                <p className="text-gray-500">Nenhum pedido encontrado</p>
              </div>
            ) : (
              <div className="space-y-4">
                {pedidos.map((pedido) => (
                  <div
                    key={pedido.id}
                    className="bg-white rounded-lg border border-gray-200 overflow-hidden"
                  >
                    <button
                      onClick={() => handleExpandClick(pedido.id)}
                      className="w-full px-4 sm:px-6 py-4 flex items-center justify-between hover:bg-gray-50 transition gap-2"
                    >
                      <div className="flex items-center gap-3 sm:gap-6 flex-1 text-left min-w-0">
                        <div className="min-w-0 flex-1">
                          <p className="font-semibold text-gray-900 text-sm sm:text-base truncate">
                            {pedido.numero_pedido}
                          </p>
                          <p className="text-xs sm:text-sm text-gray-600 mt-1">
                            {formatDate(pedido.created_at)} •{" "}
                            {getMonthName(pedido.mes_referencia)}
                          </p>
                          <p className="text-sm font-bold text-gray-900 mt-1 sm:hidden">
                            {formatCurrency(pedido.valor_total)}
                          </p>
                          {pedido.perfis && (
                            <p className="text-xs text-gray-500 mt-0.5 truncate">
                              Por: {pedido.perfis.nome || pedido.perfis.email}
                            </p>
                          )}
                        </div>
                        <div className="hidden sm:block flex-shrink-0">
                          <p className="text-xl font-bold text-gray-900">
                            {formatCurrency(pedido.valor_total)}
                          </p>
                          <p className="text-xs text-gray-500 mt-1">
                            Orçamento: {formatCurrency(pedido.orcamento)}
                          </p>
                        </div>
                      </div>

                      <div className="flex items-center gap-1 sm:gap-4 flex-shrink-0">
                        <span
                          className={`px-2 sm:px-4 py-1 sm:py-2 rounded-full text-[10px] sm:text-sm font-medium border ${getStatusColor(pedido.status)}`}
                        >
                          {getStatusLabel(pedido.status)}
                        </span>
                        <LucideChevronDown
                          size={20}
                          className={`text-gray-400 transition flex-shrink-0 ${expandedId === pedido.id ? "rotate-180" : ""}`}
                        />
                      </div>
                    </button>

                    {expandedId === pedido.id && (
                      <div className="border-t border-gray-200 px-4 sm:px-6 py-4 bg-gray-50">
                        {/* Order Details */}
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
                          <div>
                            <p className="text-sm text-gray-600">Local</p>
                            <p className="font-medium text-gray-900">
                              {pedido.locais?.nome || "Não definido"}
                            </p>
                          </div>
                          <div>
                            <p className="text-sm text-gray-600">
                              Centro de Custo
                            </p>
                            <p className="font-medium text-gray-900">
                              {pedido.centro_custo}
                            </p>
                          </div>
                        </div>

                        {/* Items */}
                        <div className="mb-6">
                          <h4 className="font-semibold text-gray-900 mb-3">
                            Itens do Pedido
                          </h4>
                          {itensPedido[pedido.id] ? (
                            <div className="space-y-2">
                              {sortItensByNome(itensPedido[pedido.id]).map((item) => {
                                const isEditing = editingId === pedido.id;
                                const currentQty = isEditing
                                  ? (editQuantities[item.id] ?? item.quantidade)
                                  : item.quantidade;
                                const subtotal = item.preco_unitario * currentQty;
                                return (
                                  <div
                                    key={item.id}
                                    className="flex items-center justify-between bg-white p-3 rounded border border-gray-200 gap-3"
                                  >
                                    <div className="min-w-0 flex-1">
                                      <p className="font-medium text-gray-900 text-sm sm:text-base break-words">
                                        {item.produtos.nome}
                                      </p>
                                      <p className="text-xs sm:text-sm text-gray-600">
                                        {getCodigoInterno(item.produtos)}
                                      </p>
                                    </div>
                                    {isEditing ? (
                                      <div className="flex items-center gap-2 flex-shrink-0">
                                        <div className="flex items-center gap-1">
                                          <button
                                            type="button"
                                            onClick={() =>
                                              handleEditQtyChange(
                                                item.id,
                                                Math.max(0, currentQty - 1),
                                              )
                                            }
                                            className="w-8 h-8 rounded border border-gray-300 bg-white text-gray-700 font-bold leading-none flex items-center justify-center hover:bg-gray-100"
                                            aria-label="Diminuir"
                                          >
                                            −
                                          </button>
                                          <input
                                            type="number"
                                            min="0"
                                            value={currentQty}
                                            onChange={(e) =>
                                              handleEditQtyChange(
                                                item.id,
                                                e.target.value,
                                              )
                                            }
                                            className="w-16 h-8 px-2 border border-gray-300 rounded text-center focus:ring-2 focus:ring-blue-500 outline-none"
                                          />
                                          <button
                                            type="button"
                                            onClick={() =>
                                              handleEditQtyChange(
                                                item.id,
                                                currentQty + 1,
                                              )
                                            }
                                            className="w-8 h-8 rounded border border-gray-300 bg-white text-gray-700 font-bold leading-none flex items-center justify-center hover:bg-gray-100"
                                            aria-label="Aumentar"
                                          >
                                            +
                                          </button>
                                        </div>
                                        <button
                                          type="button"
                                          onClick={() =>
                                            handleEditQtyChange(item.id, 0)
                                          }
                                          className="p-2 text-red-600 hover:bg-red-50 rounded"
                                          aria-label="Remover item"
                                          title="Remover item"
                                        >
                                          <LucideTrash2 size={16} />
                                        </button>
                                      </div>
                                    ) : (
                                      <div className="text-right flex-shrink-0">
                                        <p className="font-medium text-gray-900 text-sm sm:text-base">
                                          {item.quantidade} un.
                                        </p>
                                        <p className="text-xs sm:text-sm text-gray-600">
                                          {formatCurrency(item.preco_total)}
                                        </p>
                                      </div>
                                    )}
                                  </div>
                                );
                              })}
                              {editingId === pedido.id &&
                                Object.entries(addedItems)
                                  .map(([produtoId, qty]) => ({
                                    produtoId,
                                    qty,
                                    produto: produtosCatalogo.find(
                                      (p) => p.id === produtoId,
                                    ),
                                  }))
                                  .filter((x) => x.produto)
                                  .sort((a, b) =>
                                    String(a.produto.nome || "").localeCompare(
                                      String(b.produto.nome || ""),
                                      "pt-BR",
                                      { sensitivity: "base" },
                                    ),
                                  )
                                  .map(({ produtoId, qty, produto }) => {
                                  if (!produto) return null;
                                  const subtotal = produto.preco_unitario * qty;
                                  return (
                                    <div
                                      key={"new-" + produtoId}
                                      className="flex items-center justify-between bg-green-50 p-3 rounded border border-green-200 gap-3"
                                    >
                                      <div className="min-w-0 flex-1">
                                        <p className="font-medium text-gray-900 text-sm sm:text-base break-words">
                                          {produto.nome}
                                          <span className="ml-2 inline-block px-2 py-0.5 rounded-full text-[10px] font-medium bg-green-200 text-green-800 align-middle">
                                            Novo
                                          </span>
                                        </p>
                                        <p className="text-xs sm:text-sm text-gray-600">
                                          {getCodigoInterno(produto)} •{" "}
                                          {formatCurrency(produto.preco_unitario)} •{" "}
                                          Subtotal: {formatCurrency(subtotal)}
                                        </p>
                                      </div>
                                      <div className="flex items-center gap-2 flex-shrink-0">
                                        <div className="flex items-center gap-1">
                                          <button
                                            type="button"
                                            onClick={() =>
                                              handleAddedQtyChange(
                                                produtoId,
                                                Math.max(0, qty - 1),
                                              )
                                            }
                                            className="w-8 h-8 rounded border border-gray-300 bg-white text-gray-700 font-bold leading-none flex items-center justify-center hover:bg-gray-100"
                                            aria-label="Diminuir"
                                          >
                                            −
                                          </button>
                                          <input
                                            type="number"
                                            min="0"
                                            value={qty}
                                            onChange={(e) =>
                                              handleAddedQtyChange(
                                                produtoId,
                                                e.target.value,
                                              )
                                            }
                                            className="w-16 h-8 px-2 border border-gray-300 rounded text-center focus:ring-2 focus:ring-blue-500 outline-none"
                                          />
                                          <button
                                            type="button"
                                            onClick={() =>
                                              handleAddedQtyChange(
                                                produtoId,
                                                qty + 1,
                                              )
                                            }
                                            className="w-8 h-8 rounded border border-gray-300 bg-white text-gray-700 font-bold leading-none flex items-center justify-center hover:bg-gray-100"
                                            aria-label="Aumentar"
                                          >
                                            +
                                          </button>
                                        </div>
                                        <button
                                          type="button"
                                          onClick={() =>
                                            handleAddedQtyChange(produtoId, 0)
                                          }
                                          className="p-2 text-red-600 hover:bg-red-50 rounded"
                                          aria-label="Remover item"
                                          title="Remover item"
                                        >
                                          <LucideTrash2 size={16} />
                                        </button>
                                      </div>
                                    </div>
                                  );
                                })}
                              {editingId === pedido.id && (
                                <div className="flex justify-end bg-blue-50 border border-blue-200 p-3 rounded mt-2">
                                  <div className="text-right">
                                    <p className="text-xs text-gray-600">Novo total</p>
                                    <p className="text-lg font-bold text-blue-800">
                                      {formatCurrency(
                                        itensPedido[pedido.id].reduce((sum, it) => {
                                          const q = editQuantities[it.id] ?? it.quantidade;
                                          return sum + it.preco_unitario * q;
                                        }, 0) +
                                          Object.entries(addedItems).reduce(
                                            (sum, [pid, q]) => {
                                              const p = produtosCatalogo.find(
                                                (pr) => pr.id === pid,
                                              );
                                              return (
                                                sum + (p ? p.preco_unitario * q : 0)
                                              );
                                            },
                                            0,
                                          ),
                                      )}
                                    </p>
                                  </div>
                                </div>
                              )}
                            </div>
                          ) : (
                            <p className="text-gray-600 text-sm">
                              Carregando itens...
                            </p>
                          )}

                          {editingId === pedido.id && (
                            <div className="mt-4 bg-white border border-gray-200 rounded p-3">
                              <h5 className="font-semibold text-gray-900 text-sm mb-2">
                                Adicionar Produtos
                              </h5>
                              {loadingProdutos ? (
                                <p className="text-sm text-gray-500">
                                  Carregando catálogo...
                                </p>
                              ) : (
                                <>
                                  <div className="relative mb-2">
                                    <LucideSearch
                                      className="absolute left-3 top-2.5 text-gray-400"
                                      size={18}
                                    />
                                    <input
                                      type="text"
                                      value={addSearchTerm}
                                      onChange={(e) => setAddSearchTerm(e.target.value)}
                                      placeholder="Buscar por código ou descrição..."
                                      className="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm"
                                    />
                                  </div>
                                  {addSearchTerm.trim().length > 0 ? (
                                    (() => {
                                      const term = addSearchTerm.toLowerCase();
                                      const matches = produtosCatalogo
                                        .filter((p) => {
                                          return (
                                            String(p.nome || "")
                                              .toLowerCase()
                                              .includes(term) ||
                                            getCodigoInterno(p)
                                              .toLowerCase()
                                              .includes(term)
                                          );
                                        })
                                        .sort((a, b) =>
                                          String(a.nome || "").localeCompare(
                                            String(b.nome || ""),
                                            "pt-BR",
                                            { sensitivity: "base" },
                                          ),
                                        )
                                        .slice(0, 30);
                                      if (matches.length === 0) {
                                        return (
                                          <p className="text-sm text-gray-500 text-center py-3">
                                            Nenhum produto encontrado
                                          </p>
                                        );
                                      }
                                      return (
                                        <div className="max-h-72 overflow-y-auto divide-y divide-gray-100 border border-gray-200 rounded">
                                          {matches.map((p) => (
                                            <div
                                              key={p.id}
                                              className="flex items-center justify-between p-2 hover:bg-gray-50 gap-2"
                                            >
                                              <div className="min-w-0 flex-1">
                                                <p className="text-sm font-medium text-gray-900 truncate">
                                                  {p.nome}
                                                </p>
                                                <p className="text-xs text-gray-500">
                                                  {getCodigoInterno(p)} •{" "}
                                                  {formatCurrency(p.preco_unitario)}
                                                </p>
                                              </div>
                                              <button
                                                type="button"
                                                onClick={() => handleAddProduto(p)}
                                                className="inline-flex items-center gap-1 px-3 py-1 bg-blue-600 hover:bg-blue-700 text-white rounded text-xs font-medium flex-shrink-0"
                                              >
                                                <LucidePlus size={14} />
                                                Adicionar
                                              </button>
                                            </div>
                                          ))}
                                        </div>
                                      );
                                    })()
                                  ) : (
                                    <p className="text-xs text-gray-500">
                                      Digite um código ou descrição para buscar produtos.
                                    </p>
                                  )}
                                </>
                              )}
                            </div>
                          )}
                        </div>

                        {editingId === pedido.id ? (
                          <div className="mb-6">
                            <p className="text-sm text-gray-600 mb-1">
                              Observações
                            </p>
                            <textarea
                              value={editObservacoes}
                              onChange={(e) => setEditObservacoes(e.target.value)}
                              className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white"
                              rows="3"
                              placeholder="Adicione observações sobre o pedido..."
                            />
                          </div>
                        ) : (
                          pedido.observacoes && (
                            <div className="mb-6">
                              <p className="text-sm text-gray-600 mb-1">
                                Observações
                              </p>
                              <p className="text-gray-900 bg-white p-3 rounded border border-gray-200">
                                {pedido.observacoes}
                              </p>
                            </div>
                          )
                        )}

                        {editingId === pedido.id ? (
                          <div className="mb-4 flex flex-col sm:flex-row flex-wrap gap-2">
                            <button
                              onClick={() => handleSaveEdit(pedido)}
                              disabled={savingEdit}
                              className="inline-flex items-center justify-center gap-2 bg-blue-800 hover:bg-blue-900 disabled:bg-gray-400 text-white px-4 py-2 rounded-lg font-medium transition text-sm"
                            >
                              {savingEdit ? (
                                <>
                                  <div className="animate-spin rounded-full h-4 w-4 border-b-2 border-white"></div>
                                  Salvando...
                                </>
                              ) : (
                                <>
                                  <LucideSave size={16} />
                                  Salvar Alterações
                                </>
                              )}
                            </button>
                            <button
                              onClick={handleCancelEdit}
                              disabled={savingEdit}
                              className="inline-flex items-center justify-center gap-2 bg-white hover:bg-gray-50 border border-gray-300 text-gray-700 px-4 py-2 rounded-lg font-medium transition text-sm"
                            >
                              <LucideX size={16} />
                              Cancelar
                            </button>
                          </div>
                        ) : (
                          <div className="mb-4 flex flex-col sm:flex-row flex-wrap gap-2">
                            {pedido.status === "pendente" && (
                              <button
                                onClick={() => handleStartEdit(pedido)}
                                className="inline-flex items-center justify-center gap-2 bg-amber-500 hover:bg-amber-600 text-white px-4 py-2 rounded-lg font-medium transition text-sm"
                              >
                                Editar Pedido
                              </button>
                            )}
                            <a
                              href={
                                "https://wa.me/?text=Requisicao%20de%20Material%0A%0APedido:%20RM-" +
                                pedido.numero_pedido +
                                "%0AData:%20" +
                                formatDate(pedido.created_at) +
                                "%0AMes:%20" +
                                getMonthName(pedido.mes_referencia) +
                                "%0AValor:%20" +
                                formatCurrency(pedido.valor_total) +
                                "%0AStatus:%20" +
                                getStatusLabel(pedido.status)
                              }
                              target="_blank"
                              rel="noopener noreferrer"
                              className="inline-flex items-center justify-center gap-2 bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg font-medium transition text-sm"
                            >
                              Compartilhar no WhatsApp
                            </a>
                            <div className="flex gap-2">
                              <button
                                onClick={() =>
                                  generateOrderPDF(pedido, itensPedido[pedido.id], false)
                                }
                                className="inline-flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium transition text-sm flex-1 sm:flex-none"
                              >
                                <LucideDownload size={18} />
                                PDF Padrão
                              </button>
                              <button
                                onClick={() =>
                                  generateOrderPDF(pedido, itensPedido[pedido.id], true)
                                }
                                className="inline-flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-medium transition text-sm flex-1 sm:flex-none"
                              >
                                <LucideImage size={18} />
                                PDF c/ Imagens
                              </button>
                            </div>
                          </div>
                        )}

                        {/* Status Change (Admin Only) */}
                        {userRole === "admin" && (
                          <div className="border-t pt-4">
                            <p className="text-sm font-medium text-gray-700 mb-3">
                              Alterar Status
                            </p>
                            <div className="flex flex-wrap gap-2">
                              {[
                                "pendente",
                                "aprovado",
                                "entregue",
                                "cancelado",
                              ].map((status) => (
                                <button
                                  key={status}
                                  onClick={() =>
                                    handleStatusChange(pedido.id, status)
                                  }
                                  className={`px-3 py-2 rounded text-sm font-medium transition ${
                                    pedido.status === status
                                      ? `${getStatusColor(status)} border`
                                      : "bg-white border border-gray-300 text-gray-700 hover:bg-gray-50"
                                  }`}
                                >
                                  {getStatusLabel(status)}
                                </button>
                              ))}
                            </div>
                            <div className="mt-4 pt-4 border-t border-gray-200 flex justify-end">
                              <button
                                onClick={() => handleDeletePedido(pedido)}
                                className="inline-flex items-center gap-2 bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg font-medium transition text-sm"
                              >
                                <LucideTrash2 size={16} />
                                Excluir Pedido
                              </button>
                            </div>
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      }

      // Configurações Component (Admin Only)
      function Configuracoes() {
        const [usuarios, setUsuarios] = useState([]);
        const [loading, setLoading] = useState(true);
        const [locais, setLocais] = useState([]);
        const [editingOrcamento, setEditingOrcamento] = useState(null);
        const [novoOrcamento, setNovoOrcamento] = useState("");
        const [savingOrcamento, setSavingOrcamento] = useState(false);
        const [showNovoLocal, setShowNovoLocal] = useState(false);
        const [novoLocal, setNovoLocal] = useState({
          nome: "",
          codigo_contrato: "",
          centro_custo: "",
          orcamento_mensal: "",
        });
        const [savingLocal, setSavingLocal] = useState(false);

        const [showNovoUsuario, setShowNovoUsuario] = useState(false);
        const [novoUsuario, setNovoUsuario] = useState({
          nome: "",
          email: "",
          password: "",
          role: "cliente",
          local_id: "",
        });
        const [savingUsuario, setSavingUsuario] = useState(false);
        const [editingUserLocal, setEditingUserLocal] = useState(null); // Stores user.id being edited
        const [selectedLocalForUser, setSelectedLocalForUser] = useState(""); // Stores the new local_id for a user

        const [syncing, setSyncing] = useState(false);
        const [syncResult, setSyncResult] = useState(null);
        const [syncError, setSyncError] = useState("");

        const handleSyncClicVendas = async () => {
          if (
            !window.confirm(
              "Buscar preços e imagens atualizadas no ClicVendas? Produtos sem código correspondente serão ignorados.",
            )
          )
            return;

          setSyncing(true);
          setSyncError("");
          setSyncResult(null);
          try {
            const { data, error } = await supabase.functions.invoke(
              "sync-clicvendas",
              { body: {} },
            );
            if (error) throw error;
            if (data?.error) throw new Error(data.error);
            setSyncResult(data);
          } catch (err) {
            setSyncError(err.message || "Erro ao sincronizar");
          } finally {
            setSyncing(false);
          }
        };

        useEffect(() => {
          fetchData();
        }, []);

        const fetchData = async () => {
          try {
            setLoading(true);

            const { data: usersData, error: usersError } = await supabase
              .from("perfis")
              .select("*, locais(nome)") // Fetch local name along with user profile
              .eq("ativo", true)
              .order("nome");

            if (usersError) throw usersError;

            const { data: locaisData, error: locaisError } = await supabase
              .from("locais")
              .select("*")
              .eq("ativo", true);

            if (locaisError) throw locaisError;

            setUsuarios(usersData || []);
            setLocais(locaisData || []);
          } catch (err) {
            console.error("Error fetching data:", err);
            alert(`Erro ao carregar dados: ${err.message}`);
          } finally {
            setLoading(false);
          }
        };

        const handleToggleRole = async (usuario) => {
          const novoRole = usuario.role === "admin" ? "cliente" : "admin";
          if (
            !confirm(
              `Alterar ${usuario.nome} para ${novoRole === "admin" ? "Administrador" : "Cliente"}?`,
            )
          )
            return;
          try {
            const { error } = await supabase
              .from("perfis")
              .update({ role: novoRole })
              .eq("id", usuario.id);
            if (error) throw error;
            setUsuarios((prev) =>
              prev.map((u) =>
                u.id === usuario.id ? { ...u, role: novoRole } : u,
              ),
            );
          } catch (err) {
            alert(`Erro ao alterar role: ${err.message}`);
          }
        };

        const handleDesativarUsuario = async (usuario) => {
          if (
            !confirm(
              `Desativar o usuário ${usuario.nome}? Ele não conseguirá mais acessar o sistema.`,
            )
          )
            return;
          try {
            const { error } = await supabase
              .from("perfis")
              .update({ ativo: false })
              .eq("id", usuario.id);
            if (error) throw error;
            setUsuarios((prev) => prev.filter((u) => u.id !== usuario.id));
          } catch (err) {
            alert(`Erro ao desativar usuário: ${err.message}`);
          }
        };

        const handleSaveOrcamento = async (localId) => {
          const valor = parseFloat(novoOrcamento.replace(",", "."));
          if (isNaN(valor) || valor <= 0) {
            alert("Informe um valor válido");
            return;
          }
          setSavingOrcamento(true);
          try {
            const { error } = await supabase
              .from("locais")
              .update({ orcamento_mensal: valor })
              .eq("id", localId);
            if (error) throw error;
            setLocais((prev) =>
              prev.map((l) =>
                l.id === localId ? { ...l, orcamento_mensal: valor } : l,
              ),
            );
            setEditingOrcamento(null);
            setNovoOrcamento("");
          } catch (err) {
            alert(`Erro ao salvar orçamento: ${err.message}`);
          } finally {
            setSavingOrcamento(false);
          }
        };

        const handleCriarLocal = async (e) => {
          e.preventDefault();
          if (!novoLocal.nome || !novoLocal.codigo_contrato) {
            alert("Preencha nome e código do contrato");
            return;
          }
          setSavingLocal(true);
          try {
            const { data, error } = await supabase
              .from("locais")
              .insert([
                {
                  ...novoLocal,
                  orcamento_mensal: parseFloat(novoLocal.orcamento_mensal) || 0,
                  ativo: true,
                },
              ])
              .select()
              .single();
            if (error) throw error;
            setLocais((prev) => [...prev, data]);
            setNovoLocal({
              nome: "",
              codigo_contrato: "",
              centro_custo: "",
              orcamento_mensal: "",
            });
            setShowNovoLocal(false);
            alert("Local criado com sucesso!");
          } catch (err) {
            alert(`Erro ao criar local: ${err.message}`);
          } finally {
            setSavingLocal(false);
          }
        };

        const handleCriarUsuario = async (e) => {
          e.preventDefault();
          if (
            !novoUsuario.nome ||
            !novoUsuario.email ||
            !novoUsuario.password ||
            !novoUsuario.role ||
            !novoUsuario.local_id
          ) {
            alert("Preencha todos os campos obrigatórios para o novo usuário.");
            return;
          }
          setSavingUsuario(true);
          try {
            // 1. Create user in Supabase Auth
            const { data: authData, error: authError } =
              await supabase.auth.signUp({
                email: novoUsuario.email,
                password: novoUsuario.password,
                options: {
                  data: {
                    full_name: novoUsuario.nome, // Store full name in auth metadata
                  },
                },
              });

            if (authError) throw authError;
            if (!authData.user)
              throw new Error("User creation failed in auth service.");

            // 2. Insert profile into 'perfis' table
            const { error: profileError } = await supabase
              .from("perfis")
              .insert({
                id: authData.user.id,
                nome: novoUsuario.nome,
                email: novoUsuario.email,
                role: novoUsuario.role,
                local_id: novoUsuario.local_id,
                ativo: true,
              });

            if (profileError) {
              // If profile insertion fails, consider deleting the auth user to prevent orphaned accounts
              await supabase.auth.admin.deleteUser(authData.user.id);
              throw profileError;
            }

            alert(
              "Usuário criado com sucesso! Um e-mail de confirmação foi enviado.",
            );
            setNovoUsuario({
              nome: "",
              email: "",
              password: "",
              role: "cliente",
              local_id: "",
            });
            setShowNovoUsuario(false);
            fetchData(); // Refresh user list
          } catch (err) {
            console.error("Error creating user:", err);
            alert(`Erro ao criar usuário: ${err.message}`);
          } finally {
            setSavingUsuario(false);
          }
        };

        const handleSaveUserLocal = async (userId) => {
          if (!selectedLocalForUser) {
            alert("Selecione um local para o usuário.");
            return;
          }
          try {
            const { error } = await supabase
              .from("perfis")
              .update({ local_id: selectedLocalForUser })
              .eq("id", userId);
            if (error) throw error;
            alert("Local do usuário atualizado com sucesso!");
            setEditingUserLocal(null);
            setSelectedLocalForUser("");
            fetchData(); // Refresh user list to show updated local name
          } catch (err) {
            alert(`Erro ao atualizar local do usuário: ${err.message}`);
          }
        };

        if (loading) {
          return (
            <div className="flex items-center justify-center h-screen">
              <div className="text-center">
                <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-800 mx-auto mb-4"></div>
                <p className="text-gray-600">Carregando configurações...</p>
              </div>
            </div>
          );
        }

        return (
          <div className="p-4 sm:p-6 max-w-6xl mx-auto">
            <h2 className="text-2xl sm:text-3xl font-bold text-gray-800 mb-6">
              Configurações
            </h2>

            {/* ClicVendas Sync Section */}
            <div className="bg-white rounded-lg border border-gray-200 p-4 sm:p-6 mb-6">
              <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-4">
                <div>
                  <h3 className="text-lg sm:text-xl font-semibold text-gray-800">
                    Integração ClicVendas
                  </h3>
                  <p className="text-sm text-gray-600 mt-1">
                    Atualiza preço e imagem dos produtos do sistema com base
                    na tabela de preço do portal ClicVendas. Produtos sem
                    correspondência (por código) são ignorados.
                  </p>
                </div>
                <button
                  onClick={handleSyncClicVendas}
                  disabled={syncing}
                  className="flex items-center justify-center gap-2 bg-blue-800 text-white px-4 py-2 rounded-lg hover:bg-blue-900 disabled:bg-gray-400 transition text-sm font-medium self-start sm:self-auto whitespace-nowrap"
                >
                  {syncing ? "Sincronizando..." : "Sincronizar agora"}
                </button>
              </div>

              {syncError && (
                <div className="bg-red-50 border border-red-200 rounded-lg p-4 flex items-start gap-3">
                  <span className="text-red-600 text-xl">⚠️</span>
                  <p className="text-red-700 text-sm">{syncError}</p>
                </div>
              )}

              {syncResult && (
                <div className="space-y-3">
                  <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
                    <div className="bg-blue-50 border border-blue-200 rounded-lg p-3">
                      <div className="text-xs text-blue-700">No ClicVendas</div>
                      <div className="text-xl font-bold text-blue-900">
                        {syncResult.total_clic}
                      </div>
                    </div>
                    <div className="bg-gray-50 border border-gray-200 rounded-lg p-3">
                      <div className="text-xs text-gray-700">No sistema</div>
                      <div className="text-xl font-bold text-gray-900">
                        {syncResult.total_sistema}
                      </div>
                    </div>
                    <div className="bg-green-50 border border-green-200 rounded-lg p-3">
                      <div className="text-xs text-green-700">Atualizados</div>
                      <div className="text-xl font-bold text-green-800">
                        {syncResult.atualizados}
                      </div>
                    </div>
                    <div className="bg-yellow-50 border border-yellow-200 rounded-lg p-3">
                      <div className="text-xs text-yellow-700">
                        Sem correspondência
                      </div>
                      <div className="text-xl font-bold text-yellow-800">
                        {syncResult.nao_encontrados}
                      </div>
                    </div>
                  </div>

                  {syncResult.alertas_preco?.length > 0 && (
                    <div className="bg-orange-50 border border-orange-300 rounded-lg p-4">
                      <div className="flex items-center gap-2 mb-3">
                        <span className="text-orange-600 text-xl">⚠️</span>
                        <h4 className="font-semibold text-orange-900">
                          {syncResult.alertas_preco.length} produto(s) com
                          preço no sistema MENOR que no ClicVendas
                        </h4>
                      </div>
                      <div className="overflow-x-auto">
                        <table className="w-full text-sm">
                          <thead>
                            <tr className="text-left text-orange-900 border-b border-orange-200">
                              <th className="py-2 pr-3">Código</th>
                              <th className="py-2 pr-3">Produto</th>
                              <th className="py-2 pr-3 text-right">
                                Sistema
                              </th>
                              <th className="py-2 pr-3 text-right">
                                ClicVendas
                              </th>
                              <th className="py-2 pr-3 text-right">
                                Diferença
                              </th>
                            </tr>
                          </thead>
                          <tbody>
                            {syncResult.alertas_preco.map((a) => (
                              <tr
                                key={a.id}
                                className="border-b border-orange-100"
                              >
                                <td className="py-2 pr-3 font-mono text-xs">
                                  {a.codigo}
                                </td>
                                <td className="py-2 pr-3">{a.nome}</td>
                                <td className="py-2 pr-3 text-right">
                                  R$ {a.preco_sistema.toFixed(2)}
                                </td>
                                <td className="py-2 pr-3 text-right font-semibold">
                                  R$ {a.preco_clic.toFixed(2)}
                                </td>
                                <td className="py-2 pr-3 text-right text-orange-700 font-semibold">
                                  +R$ {a.diferenca.toFixed(2)}
                                </td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  )}

                  {syncResult.atualizados === 0 &&
