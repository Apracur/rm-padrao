      const formatCurrency = (value) => {
        if (!value) return "R$ 0,00";
        return new Intl.NumberFormat("pt-BR", {

          currency: "BRL",
        }).format(value);

      const formatDate = (dateString) => {

        return date.toLocaleDateString("pt-BR");
      };

      const getMonthName = (monthStr) => {
        const months = [
          "Janeiro",
          "Fevereiro",
          "Março",
          "Abril",
          "Maio",
          "Junho",
          "Julho",
          "Agosto",
          "Setembro",
          "Outubro",
          "Novembro",
          "Dezembro",
        ];
        if (!monthStr) return "";
        const [year, month] = monthStr.split("-");
        return `${months[parseInt(month) - 1]}/${year}`;
      };

        // Header

        doc.line(20, 35, 190, 35);

        // Order Info
        doc.setFontSize(11);
        doc.setTextColor(0, 0, 0);
        doc.setFont("helvetica", "normal");

        const numero = pedido.numero_pedido || pedido.numero;
        const dataParaPDF = formatDate(pedido.created_at || new Date());
        const mesParaPDF = getMonthName(pedido.mes_referencia || pedido.mes);
        const clienteParaPDF = pedido.locais?.nome || pedido.cliente_nome || "N/A";
        const statusParaPDF = (pedido.status || "pendente").toUpperCase();

        doc.text(`Pedido: RM-${numero}`, 20, 45);
        doc.text(`Data: ${dataParaPDF}`, 20, 52);
        doc.text(`Mês Ref: ${mesParaPDF}`, 20, 59);

        doc.text(`Cliente: ${clienteParaPDF}`, 120, 45);
        doc.text(`Centro de Custo: ${pedido.centro_custo || "N/A"}`, 120, 52);
        doc.text(`Status: ${statusParaPDF}`, 120, 59);

        // Table
        const tableData = itens.map((item) => [
          item.produtos?.codigo_fornecedor ||
            item.codigo ||
            item.produtos?.codigo ||
            "N/A",
          item.produtos?.nome || item.nome || "N/A",
          item.produtos?.marca || item.marca || "N/A",
          item.produtos?.unidade || item.unidade || "N/A",
          item.quantidade,
          formatCurrency(
            item.preco_unitario || item.preco_total / item.quantidade,
          ),
          formatCurrency(item.preco_total),
        ]);

        doc.autoTable({
          startY: 70,
          head: [
            ["Cód.", "Descrição", "Marca", "Unid.", "Qtd.", "P. Unit", "Subtotal"],
          ],
          body: tableData,
          theme: "striped",
          headStyles: { fillColor: [30, 58, 138], textColor: 255 },
          columnStyles: {
            4: { halign: "center" },
            5: { halign: "right" },
            6: { halign: "right" },
          },
        });

        // Total
        const finalY = doc.lastAutoTable.finalY + 10;
        const valorTotal = pedido.valor_total || pedido.valor;
        doc.setFontSize(12);
        doc.setFont("helvetica", "bold");
        doc.text(`VALOR TOTAL: ${formatCurrency(valorTotal)}`, 190, finalY, {
          align: "right",
        });

        if (pedido.orcamento) {
          doc.setFontSize(10);
          doc.setFont("helvetica", "normal");
          doc.setTextColor(100, 100, 100);
          doc.text(
            `Orçamento Mensal: ${formatCurrency(pedido.orcamento)}`,
            190,
            finalY + 7,
            { align: "right" },
          );
        }

        // Observations
        if (pedido.observacoes) {
          doc.setFontSize(10);
          doc.setFont("helvetica", "italic");
          doc.setTextColor(70, 70, 70);
          doc.text("Observações:", 20, finalY + 15);
          const splitObs = doc.splitTextToSize(pedido.observacoes, 170);
          doc.text(splitObs, 20, finalY + 22);
        }

        // Footer
        const pageCount = doc.internal.getNumberOfPages();
        for (let i = 1; i <= pageCount; i++) {
          doc.setPage(i);
          doc.setFontSize(9);
          doc.setTextColor(150, 150, 150);
          doc.text(`Página ${i} de ${pageCount}`, 105, 285, { align: "center" });
          doc.text("Sistema de Requisição de Material - Ello Atacadão", 105, 290, {
            align: "center",
          });
        }

        doc.save(`Pedido_RM_${numero}.pdf`);

      // Login Component
      function LoginPage({ onLogin }) {
        const [email, setEmail] = useState("");
        const [password, setPassword] = useState("");
        const [loading, setLoading] = useState(false);
        const [error, setError] = useState("");

        const handleLogin = async (e) => {
          e.preventDefault();
          setLoading(true);
          setError("");

          try {
            const { data, error: authError } =
              await supabase.auth.signInWithPassword({
                email,
                password,
              });

            if (authError) throw authError;
            if (data.user) {
              onLogin(data.user);
            }
          } catch (err) {
            setError(err.message || "Erro ao fazer login");
          } finally {
            setLoading(false);
          }
        };

        return (
          <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-blue-100 p-4">
            <div className="w-full max-w-md">
              <div className="bg-white rounded-lg shadow-xl p-8">
                <div className="text-center mb-8">
                  <div className="inline-block bg-blue-800 text-white rounded-lg px-4 py-2 mb-4">
                    <h1 className="text-2xl font-bold">Ello Atacadão</h1>
                  </div>
                  <h2 className="text-2xl font-bold text-gray-800">
                    Requisição de Material
                  </h2>
                  <p className="text-gray-600 mt-2">
                    FM2C - Bridgestone em Camaçari
                  </p>
                </div>

                {error && (
                  <div className="bg-red-50 border border-red-200 rounded-lg p-4 mb-6 flex items-start gap-3">
                    <span className="text-red-600 text-xl">⚠️</span>
                    <p className="text-red-700">{error}</p>
                  </div>
                )}

                <form onSubmit={handleLogin} className="space-y-4">
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-2">
                      E-mail
                    </label>
                    <input
                      type="email"
                      value={email}
                      onChange={(e) => setEmail(e.target.value)}
                      className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                      placeholder="seu@email.com"
                      disabled={loading}
                    />
                  </div>

                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-2">
                      Senha
                    </label>
                    <input
                      type="password"
                      value={password}
                      onChange={(e) => setPassword(e.target.value)}
                      className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                      placeholder="••••••••"
                      disabled={loading}
                    />
                  </div>

                  <button
                    type="submit"
                    disabled={loading}
                    className="w-full bg-blue-800 text-white py-2 rounded-lg font-medium hover:bg-blue-900 disabled:bg-gray-400 transition duration-200"
                  >
                    {loading ? "Fazendo login..." : "Entrar"}
                  </button>
                </form>

                <p className="text-center text-gray-600 text-sm mt-6">
                  Versão 1.0 | Sistema de Requisição de Material
                </p>
              </div>
            </div>
          </div>
        );
      }

      // Sidebar Component
      function Sidebar({
        user,
        userRole,
        onLogout,
        currentPage,
        onPageChange,
      }) {

        useEffect(() => {
          if (user) {
            fetchUserProfile();
          }
        }, [user]);

        const fetchUserProfile = async () => {
          try {
            const { data, error } = await supabase
              .from("perfis")
              .select("*")
              .eq("email", user.email)
              .single();

            if (data) setUserProfile(data);
          } catch (err) {
            console.error("Error fetching profile:", err);
          }
        };

        const menuItems = [
          { id: "nova-requisicao", label: "Nova Requisição", icon: LucidePlus },
          { id: "meus-pedidos", label: "Meus Pedidos", icon: LucideFileText },

        if (userRole === "admin") {
          menuItems.push(
            { id: "estoque", label: "Estoque", icon: LucidePackage },
            {
              id: "configuracoes",
              label: "Configurações",
              icon: LucideSettings,

          );
        }

        return (
          <div className="w-64 bg-blue-800 text-white flex flex-col h-screen shadow-lg">
            <div className="p-6 border-b border-blue-700">
              <h1 className="font-bold text-xl mb-2">Ello Atacadão</h1>
              <p className="text-blue-100 text-sm">
                RM - Requisição de Material
              </p>
            </div>

            <div className="flex-1 overflow-y-auto">
              <nav className="p-4 space-y-2">
                {menuItems.map((item) => {
                  const ItemIcon = item.icon;
                  return (
                    <button
                      key={item.id}
                      onClick={() => onPageChange(item.id)}
                      className={`w-full text-left px-4 py-3 rounded-lg transition duration-200 flex items-center gap-3 ${
                        currentPage === item.id
                          ? "bg-blue-900 font-medium"
                          : "hover:bg-blue-700"
                      }`}
                    >
                      {ItemIcon && <ItemIcon size={20} />}
                      <span>{item.label}</span>
                    </button>
                  );
                })}
              </nav>
            </div>

            <div className="p-4 border-t border-blue-700 space-y-4">
              {userProfile && (
                <div className="bg-blue-700 rounded-lg p-3 text-sm">
                  <p className="font-medium text-blue-100">Usuário</p>
                  <p className="text-white font-semibold truncate">
                    {userProfile.nome || "Usuário"}
                  </p>
                  <p className="text-blue-100 text-xs mt-1">
                    {userRole === "admin" ? "Administrador" : "Cliente"}
                  </p>
                </div>
              )}
              <button
                onClick={onLogout}
                className="w-full bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg transition duration-200 flex items-center justify-center gap-2"
              >
                <LucideLogOut size={18} />
                <span>Sair</span>
              </button>
            </div>
          </div>
        );
      }

      // Nova Requisição Component
      function NovaRequisicao({ user, userRole }) {
        const [produtos, setProdutos] = useState([]);
        const [estoque, setEstoque] = useState({});
        const [cartItems, setCartItems] = useState({});
        const [searchTerm, setSearchTerm] = useState("");
        const [filterBrand, setFilterBrand] = useState("");
        const [loading, setLoading] = useState(true);
        const [loadError, setLoadError] = useState("");
        const [mesReferencia, setMesReferencia] = useState("");
        const [observacoes, setObservacoes] = useState("");
        const [showSuccess, setShowSuccess] = useState(false);
        const [successMessage, setSuccessMessage] = useState("");
        const [lastPedido, setLastPedido] = useState(null);
        const [userLocalId, setUserLocalId] = useState(null);
        const [submitting, setSubmitting] = useState(false);

        const [orcamento, setOrcamento] = useState(0);
        const [cliente, setCliente] = useState("");
        const [localNome, setLocalNome] = useState("");
        const [centroCusto, setCentroCusto] = useState("");

        // Wraps a promise with a timeout so a hanging query never freezes the UI
        const withTimeout = (promise, ms = 10000, label = "query") => {
          return Promise.race([
            promise,
            new Promise((_, reject) =>
              setTimeout(
                () =>
                  reject(
                    new Error(
                      `Timeout: ${label} demorou mais de ${ms / 1000}s`,
                    ),
                  ),
                ms,
              ),
            ),
          ]);
        };

        useEffect(() => {
          if (user?.id) {
            loadData();
          }
          // Use user?.id (not full user object) so this only re-fires when the
          // user IDENTITY changes, not when Supabase refreshes the token and
          // recreates the user object reference (TOKEN_REFRESHED events).
          // eslint-disable-next-line react-hooks/exhaustive-deps
        }, [user?.id]);

        const loadData = async () => {
          setLoading(true);
          setLoadError("");
          try {
            // Fetch products and user profile IN PARALLEL, each with a timeout
            const [prodResult, perfilResult] = await Promise.allSettled([
              withTimeout(
                supabase.from("produtos").select("*").eq("ativo", true),
                10000,
                "produtos",
              ),
              withTimeout(
                supabase
                  .from("perfis")
                  .select("local_id, locais(*)")
                  .eq("email", user.email)
                  .single(),
                10000,
                "perfis",
              ),
            ]);

            // Handle products result
            if (prodResult.status === "fulfilled") {
              const { data, error } = prodResult.value;
              if (error) {
                console.error("Erro ao buscar produtos:", error);
                setLoadError("Erro ao carregar produtos: " + error.message);
                return;
              }
              setProdutos(data || []);
            } else {
              console.error("Timeout/erro em produtos:", prodResult.reason);
              setLoadError(
                "Não foi possível carregar os produtos. Verifique sua conexão e tente novamente.",
              );
              return;
            }

            // Handle perfis result (non-blocking — page loads even without local_id)
            let localId = null;
            if (perfilResult.status === "fulfilled") {
              const { data, error } = perfilResult.value;
              if (!error && data) {
                localId = data.local_id;
                setUserLocalId(localId);
                if (data.locais) {
                  setOrcamento(data.locais.orcamento_mensal || 0);
                  setCliente(data.locais.codigo_contrato || "");
                  setLocalNome(data.locais.nome || "");
                  setCentroCusto(data.locais.centro_custo || "");
                }
              } else {
                console.warn("Perfil sem local_id ou erro:", error);
              }
            } else {
              console.warn("Timeout ao buscar perfil:", perfilResult.reason);
            }

            // Fetch estoque if we have a localId
            if (localId) {
              try {
                const { data: estData, error: estError } = await withTimeout(
                  supabase
                    .from("estoque")
                    .select("produto_id, quantidade")
                    .eq("local_id", localId),
                  8000,
                  "estoque",
                );
                if (!estError && estData) {
                  const estoqueMap = {};
                  estData.forEach((item) => {
                    estoqueMap[item.produto_id] = item.quantidade;
                  });
                  setEstoque(estoqueMap);
                }
              } catch (estErr) {
                console.warn("Não foi possível carregar estoque:", estErr);
                // Non-fatal — continue without estoque data
              }
            }
          } catch (err) {
            console.error("Erro inesperado:", err);
            setLoadError("Erro inesperado: " + err.message);
          } finally {
            setLoading(false);
          }
        };

        // ── All hooks must come BEFORE any early returns (Rules of Hooks) ──
        const totalValue = useMemo(() => {
          return Object.entries(cartItems).reduce((sum, [prodId, qty]) => {
            const produto = produtos.find((p) => p.id === prodId);
            return sum + (produto ? produto.preco_unitario * qty : 0);
          }, 0);
        }, [cartItems, produtos]);

        const saldoRestante = orcamento - totalValue;
        const exceedsBudget = totalValue > orcamento;

        const filteredProdutos = useMemo(() => {
          return produtos.filter((p) => {
            const nome = String(p.nome || "").toLowerCase();
            const codigo = String(p.codigo_fornecedor || "").toLowerCase();
            const busca = String(searchTerm || "").toLowerCase();
            const matchSearch = nome.includes(busca) || codigo.includes(busca);
            const matchBrand = !filterBrand || p.marca === filterBrand;
            return matchSearch && matchBrand;
          });
        }, [produtos, searchTerm, filterBrand]);

        const uniqueBrands = useMemo(() => {
          return [
            ...new Set(produtos.map((p) => p.marca).filter(Boolean)),
          ].sort();
        }, [produtos]);

        // ── Early returns (after all hooks) ──
        if (loading) {
          return (
            <div className="flex items-center justify-center h-screen">
              <div className="text-center">
                <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-800 mx-auto mb-4"></div>
                <p className="text-gray-600">Carregando produtos...</p>
              </div>
            </div>
          );
        }

        if (loadError) {
          return (
            <div className="flex items-center justify-center h-screen">
              <div className="text-center max-w-md">
                <div className="text-5xl mb-4">⚠️</div>
                <h3 className="text-xl font-bold text-gray-800 mb-2">
                  Erro ao carregar
                </h3>
                <p className="text-gray-600 mb-6 text-sm">{loadError}</p>
                <button
                  onClick={loadData}
                  className="bg-blue-800 text-white px-6 py-3 rounded-lg font-medium hover:bg-blue-900 transition"
                >
                  🔄 Tentar novamente
                </button>
              </div>
            </div>
          );
        }

        const handleQuantityChange = (produtoId, value) => {
          const qty = parseInt(value) || 0;
          if (qty > 0) {
            setCartItems((prev) => ({
              ...prev,
              [produtoId]: qty,
            }));
          } else {
            setCartItems((prev) => {
              const updated = { ...prev };
              delete updated[produtoId];
              return updated;
            });
          }
        };

        const handleSubmit = async (e) => {
          e.preventDefault();

          if (Object.keys(cartItems).length === 0) {
            alert("Adicione pelo menos um produto ao pedido");
            return;
          }

          if (!mesReferencia) {
            alert("Selecione o mês de referência");
            return;
          }

          setSubmitting(true);
          try {
            const {
              data: { user: authUser },
            } = await supabase.auth.getUser();

            const { data: pedido, error: pedidoError } = await supabase
              .from("pedidos")
              .insert([
                {
                  numero_pedido: Math.floor(Date.now() / 1000),
                  local_id: userLocalId,
                  usuario_id: authUser.id,
                  mes_referencia: mesReferencia ? `${mesReferencia}-01` : null,
                  valor_total: totalValue,
                  orcamento: orcamento,
                  status: "pendente",
                  observacoes: observacoes,
                  centro_custo: centroCusto || cliente,
                },
              ])
              .select()
              .single();

            if (pedidoError) throw pedidoError;

            const itens = Object.entries(cartItems).map(([prodId, qty]) => {
              const produto = produtos.find((p) => p.id === prodId);
              return {
                pedido_id: pedido.id,
                produto_id: prodId,
                quantidade: qty,
                preco_unitario: produto.preco_unitario,
                preco_total: produto.preco_unitario * qty,
              };
            });

            const { error: itensError } = await supabase
              .from("itens_pedido")
              .insert(itens);

            if (itensError) throw itensError;

            const numeroPedido = `RM-${pedido.numero_pedido}`;
            const valorTotal = totalValue;
            setSuccessMessage(`Pedido ${numeroPedido} criado com sucesso!`);
            setLastPedido({
              numero: numeroPedido,
              valor: valorTotal,
              mes: mesReferencia,
            });
            setShowSuccess(true);
            setCartItems({});
            setMesReferencia("");
            setObservacoes("");

            setTimeout(() => setShowSuccess(false), 8000);
          } catch (err) {
            console.error("Error creating order:", err);
            alert(`Erro ao criar pedido: ${err.message}`);
          } finally {
            setSubmitting(false);
          }
        };

        return (
          <div className="p-6 max-w-7xl mx-auto">
            {!userLocalId && (
              <div className="bg-amber-50 border-l-4 border-amber-400 p-4 mb-6 rounded">
                <div className="flex gap-3">
                  <span className="text-2xl">⚠️</span>
                  <div>
                    <p className="font-medium text-amber-800">
                      Local não vinculado
                    </p>
                    <p className="text-sm text-amber-700 mt-1">
                      Seu perfil não possui um <strong>local_id</strong>{" "}
                      configurado. As informações de estoque não serão exibidas.
                    </p>
                  </div>
                </div>
              </div>
            )}

            {showSuccess && (
              <div className="fixed top-4 right-4 bg-green-50 border border-green-200 rounded-lg p-4 flex flex-col gap-3 max-w-md shadow-lg">
                <div className="flex items-start gap-3">
                  <span className="text-green-600 text-xl">✓</span>
                  <div>
                    <p className="font-medium text-green-800">
                      {successMessage}
                    </p>
                    <p className="text-sm text-green-700 mt-1">
                      Pedido registrado com sucesso!
                    </p>
                  </div>
                </div>
                {lastPedido &&
                  (() => {
                    const waMsgNR =
                      "Pedido: " +
                      lastPedido.numero +
                      "%0AMes: " +
                      getMonthName(lastPedido.mes) +
                      "%0AValor Total: " +
                      formatCurrency(lastPedido.valor) +
                      "%0ACliente: " +
                      encodeURIComponent(cliente) +
                      "%0A%0AAguardando aprovacao.";
                    return (
                      <a
                        href={
                          "https://wa.me/?text=Requisicao%20de%20Material%20-%20Ello%20Atacadao%0A%0A" +
                          waMsgNR
                        }
                        target="_blank"
                        rel="noopener noreferrer"
                        className="flex items-center justify-center gap-2 bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg font-medium transition text-sm"
                      >
                        Compartilhar no WhatsApp
                      </a>
                      <button
                        onClick={() => {
                          // Create simplified pedido object for PDF
                          const pedidoPDF = {
                            numero: lastPedido.numero.replace("RM-", ""),
                            mes: lastPedido.mes,
                            valor: lastPedido.valor,
                            cliente_nome: cliente,
                            centro_custo: centroCusto,
                            status: "pendente",
                            observacoes: observacoes,
                            orcamento: orcamento,
                          };

                          // Create itens array for PDF from cartItems
                          const itensPDF = Object.entries(cartItems).map(
                            ([prodId, qty]) => {
                              const produto = produtos.find((p) => p.id === prodId);
                              return {
                                produtos: produto,
                                quantidade: qty,
                                preco_total: produto.preco_unitario * qty,
                                preco_unitario: produto.preco_unitario,
                              };
                            },
                          );

                          generateOrderPDF(pedidoPDF, itensPDF);
                        }}
                        className="flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium transition text-sm"
                      >
                        <LucideDownload size={18} />
                        Baixar PDF
                      </button>
                    </div>
                  );
                })()}
            </div>
          )}

            <h2 className="text-3xl font-bold text-gray-800 mb-6">
              Nova Requisição
            </h2>

            {/* Budget Summary */}
            <div className="grid grid-cols-3 gap-4 mb-6">
              <div className="bg-white rounded-lg p-4 border border-gray-200">
                <p className="text-gray-600 text-sm mb-1">
                  Orçamento Disponível
                </p>
                <p className="text-2xl font-bold text-blue-800">
                  {formatCurrency(orcamento)}
                </p>
              </div>
              <div className="bg-white rounded-lg p-4 border border-gray-200">
                <p className="text-gray-600 text-sm mb-1">Total do Pedido</p>
                <p className="text-2xl font-bold text-gray-800">
                  {formatCurrency(totalValue)}
                </p>
              </div>
              <div
                className={`rounded-lg p-4 border-2 ${
                  exceedsBudget
                    ? "bg-red-50 border-red-200"
                    : "bg-green-50 border-green-200"
                }`}
              >
                <p
                  className={`text-sm mb-1 ${exceedsBudget ? "text-red-600" : "text-green-600"}`}
                >
                  Saldo Restante
                </p>
                <p
                  className={`text-2xl font-bold ${exceedsBudget ? "text-red-800" : "text-green-800"}`}
                >
                  {formatCurrency(Math.max(0, saldoRestante))}
                </p>
              </div>
            </div>

            {exceedsBudget && (
              <div className="bg-amber-50 border-l-4 border-amber-400 p-4 mb-6 rounded">
                <div className="flex gap-3">
                  <span className="text-2xl">⚠️</span>
                  <div>
                    <p className="font-medium text-amber-800">
                      Orçamento Excedido
                    </p>
                    <p className="text-sm text-amber-700 mt-1">
                      O valor total do pedido ({formatCurrency(totalValue)})
                      excede o orçamento disponível. Reduza a quantidade de
                      produtos ou remova alguns itens.
                    </p>
                  </div>
                </div>
              </div>
            )}

            {/* Form */}
            <form onSubmit={handleSubmit} className="space-y-6">
              {/* Date and Observations */}
              <div className="grid grid-cols-2 gap-6 bg-white rounded-lg p-6 border border-gray-200">
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-2">
                    Mês de Referência
                  </label>
                  <input
                    type="month"
                    value={mesReferencia}
                    onChange={(e) => setMesReferencia(e.target.value)}
                    className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                    required
                  />
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-2">
                    Cliente
                  </label>
                  <input
                    type="text"
                    value={cliente}
                    disabled
                    className="w-full px-4 py-2 border border-gray-300 rounded-lg bg-gray-50 text-gray-600"
                  />
                </div>
              </div>

              <div className="bg-white rounded-lg p-6 border border-gray-200">
                <label className="block text-sm font-medium text-gray-700 mb-2">
                  Observações
                </label>
                <textarea
                  value={observacoes}
                  onChange={(e) => setObservacoes(e.target.value)}
                  className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                  rows="3"
                  placeholder="Adicione observações sobre o pedido..."
                />
              </div>

              {/* Search and Filter */}
              <div className="grid grid-cols-2 gap-4 bg-white rounded-lg p-6 border border-gray-200">
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-2">
                    Buscar Produto
                  </label>
                  <div className="relative">
                    <LucideSearch
                      className="absolute left-3 top-3 text-gray-400"
                      size={20}
                    />
                    <input
                      type="text"
                      value={searchTerm}
                      onChange={(e) => setSearchTerm(e.target.value)}
                      className="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                      placeholder="Código ou descrição..."
                    />
                  </div>
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-2">
                    Filtrar por Marca
                  </label>
                  <select
                    value={filterBrand}
                    onChange={(e) => setFilterBrand(e.target.value)}
                    className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                  >
                    <option value="">Todas as marcas</option>
                    {uniqueBrands.map((brand) => (
                      <option key={brand} value={brand}>
                        {brand}
                      </option>
                    ))}
                  </select>
                </div>
              </div>

              {/* Products Table */}
              <div className="bg-white rounded-lg border border-gray-200 overflow-hidden">
                <div className="overflow-x-auto">
                  <table className="w-full text-sm">
                    <thead className="bg-gray-50 border-b border-gray-200">
                      <tr>
                        <th className="px-6 py-3 text-left font-semibold text-gray-700">
                          Código
                        </th>
                        <th className="px-6 py-3 text-left font-semibold text-gray-700">
                          Descrição
                        </th>
                        <th className="px-6 py-3 text-left font-semibold text-gray-700">
                          Marca
                        </th>
                        <th className="px-6 py-3 text-left font-semibold text-gray-700">
                          Unidade
                        </th>
                        <th className="px-6 py-3 text-right font-semibold text-gray-700">
                          Preço Unit.
                        </th>
                        <th className="px-6 py-3 text-center font-semibold text-gray-700">
                          Estoque
                        </th>
                        <th className="px-6 py-3 text-center font-semibold text-gray-700">
                          Qtd.
                        </th>
                        <th className="px-6 py-3 text-right font-semibold text-gray-700">
                          Subtotal
                        </th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-gray-200">
                      {filteredProdutos.map((produto) => {
                        const qty = cartItems[produto.id] || 0;
                        const qtdEstoque = estoque[produto.id] || 0;
                        const subtotal = produto.preco_unitario * qty;

                        return (
                          <tr
                            key={produto.id}
                            className="hover:bg-blue-50 transition"
                          >
                            <td className="px-6 py-4 font-medium text-gray-900">
                              {produto.codigo_fornecedor}
                            </td>
                            <td className="px-6 py-4 text-gray-700">
                              {produto.nome}
                            </td>
                            <td className="px-6 py-4 text-gray-600">
                              {produto.marca}
                            </td>
                            <td className="px-6 py-4 text-gray-600">
                              {produto.unidade}
                            </td>
                            <td className="px-6 py-4 text-right font-medium text-gray-800">
                              {formatCurrency(produto.preco_unitario)}
                            </td>
